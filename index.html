var P2   = UNITS.filter(function(u){return u.p===2;});

// -- State ----------------------------------------------------------------------
var DB={}, DATES=[], SEL=null, TAB="db";
var CAL_M=new Date().getMonth(), CAL_Y=new Date().getFullYear();
var T_SEC=0, T_RUN=false, T_MODE="study", T_INT=null, T_SAVE=null;
var SBC=null, SBU=null;

function mkU(){
  return {status:"open",score:0,planned:"",completed:"",tags:[],notes:"",
          srNext:"",srInterval:1,srReps:0,srLast:""};
}
function initDB(){
  var d={};
  UNITS.forEach(function(u){ d[u.id]=mkU(); });
  return d;
}

// -- Helpers -------------------------------------------------------------------
function today(){ return new Date().toISOString().split("T")[0]; }
function daysUntil(d){ return Math.ceil((new Date(d)-new Date())/86400000); }
function pct(units){
  var done=units.filter(function(u){return DB[u.id]&&DB[u.id].status==="done";}).length;
  return units.length ? Math.round(done/units.length*100) : 0;
}
function allTags(){
  var out=[];
  UNITS.forEach(function(u){
    var tags=DB[u.id]&&DB[u.id].tags||[];
    tags.forEach(function(t){ out.push({tag:t,id:u.id,title:u.title}); });
  });
  return out;
}
function streak(){
  var sorted=[].concat(DATES).filter(function(v,i,a){return a.indexOf(v)===i;}).sort().reverse();
  if(!sorted.length) return 0;
  var cur=new Date(); cur.setHours(0,0,0,0);
  var n=0;
  for(var i=0;i<90;i++){
    var s=cur.toISOString().split("T")[0];
    if(sorted.indexOf(s)>=0){n++;cur.setDate(cur.getDate()-1);}
    else if(i===0){cur.setDate(cur.getDate()-1);}
    else break;
  }
  return n;
}
function fmt(s){
  return pad(Math.floor(s/3600))+":"+pad(Math.floor((s%3600)/60))+":"+pad(s%60);
}
function pad(n){ return String(n).padStart(2,"0"); }

// -- Spaced Repetition (SM-2) --------------------------------------------------
function srUpdate(id, score){
  var u=DB[id];
  var td=today();
  u.srLast=td;
  u.srReps=(u.srReps||0)+1;
  var interval;
  if(score<=2){
    interval=1; u.srReps=0; u.srInterval=1;
  } else if(score===3){
    interval=Math.max(2, Math.round((u.srInterval||1)*1.2));
  } else if(score===4){
    interval=Math.max(4, Math.round((u.srInterval||1)*2.0));
  } else {
    interval=Math.max(7, Math.round((u.srInterval||1)*2.5));
  }
  u.srInterval=interval;
  var next=new Date(td);
  next.setDate(next.getDate()+interval);
  u.srNext=next.toISOString().split("T")[0];
}
function srDue(){
  var td=today();
  return UNITS.filter(function(u){
    var d=DB[u.id];
    return d && d.srNext && d.srNext<=td;
  });
}
function srSoon(){
  var td=today();
  var lim=new Date(); lim.setDate(lim.getDate()+3);
  var limS=lim.toISOString().split("T")[0];
  return UNITS.filter(function(u){
    var d=DB[u.id];
    return d && d.srNext && d.srNext>td && d.srNext<=limS;
  });
}
function srDays(id){
  var d=DB[id]; if(!d||!d.srNext) return null;
  return Math.ceil((new Date(d.srNext)-new Date())/86400000);
}
function srBadge(id){
  var d=DB[id]; if(!d||!d.srNext) return "";
  var days=srDays(id);
  if(days<=0) return '<span class="bdg" style="color:#ef4444;background:#450a0a">🔁 fällig</span>';
  if(days<=3) return '<span class="bdg" style="color:#f59e0b;background:#431407">🔁 '+days+'d</span>';
  return '<span class="bdg" style="color:#34d399;background:#052e16">🔁 '+days+'d</span>';
}

// -- Storage -------------------------------------------------------------------
function loadLocal(){
  try{
    var d=localStorage.getItem("pt_v5_data");
    var dt=localStorage.getItem("pt_v5_dates");
    DB=d?JSON.parse(d):initDB();
    DATES=dt?JSON.parse(dt):[];
    UNITS.forEach(function(u){ if(!DB[u.id]) DB[u.id]=mkU(); });
    // ensure SR fields exist on old data
    UNITS.forEach(function(u){
      var e=DB[u.id];
      if(!e.srNext)    e.srNext="";
      if(!e.srInterval)e.srInterval=1;
      if(!e.srReps)    e.srReps=0;
      if(!e.srLast)    e.srLast="";
    });
  } catch(e){ DB=initDB(); DATES=[]; }
}
function saveData(){
  setSS("saving");
  clearTimeout(T_SAVE);
  T_SAVE=setTimeout(function(){
    try{
      localStorage.setItem("pt_v5_data",JSON.stringify(DB));
      localStorage.setItem("pt_v5_dates",JSON.stringify(DATES));
    }catch(e){}
    if(SBC&&SBU){
      SBC.from("physio_data").upsert(
        {user_id:SBU.id,unit_data:DB,streak_dates:DATES,updated_at:new Date().toISOString()},
        {onConflict:"user_id"}
      ).then(function(r){setSS(r.error?"error":"synced");});
    } else { setSS("local"); }
  },600);
}
function setSS(s){
  var el=document.getElementById("sync"); if(!el) return;
  var map={saving:["saving","(*) Speichert…"],synced:["","(*) Synced ✓"],local:["","(*) Lokal"],error:["error","(*) Fehler"]};
  var v=map[s]||map.local;
  el.className=v[0]; el.textContent=v[1];
}
function markToday(){
  var t=today();
  if(DATES.indexOf(t)<0){ DATES=DATES.concat([t]); saveData(); }
  updateHdr();
}

  // Try multiple CDNs in sequence
  var cdns=[
    "https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js",
    "https://unpkg.com/@supabase/supabase-js@2/dist/umd/supabase.js",
    "https://esm.sh/@supabase/supabase-js@2/dist/umd/supabase.js"
  ];
  var idx=0;
  function tryNext(){
    if(idx>=cdns.length){ console.warn("All Supabase CDNs failed"); setSS("local"); return; }
    var s=document.createElement("script");
    s.src=cdns[idx++];
    s.onload=function(){ if(typeof supabase!=="undefined"){ connectSB(); } else { tryNext(); } };
    s.onerror=function(){ tryNext(); };
    document.head.appendChild(s);
  }
  tryNext();
}
function connectSB(){
  try{
    SBC=supabase.createClient(SUPABASE_URL,SUPABASE_KEY,{
      auth:{
        detectSessionInUrl:true,
        persistSession:true,
        autoRefreshToken:true
      }
    });
    // Handle OAuth callback - exchange code/token in URL
    SBC.auth.getSession().then(function(r){
      if(r.data&&r.data.session){
        SBU=r.data.session.user;
        // Clean URL after OAuth redirect
        if(window.location.hash&&window.location.hash.indexOf("access_token")>=0){
          history.replaceState(null,"",window.location.pathname);
        }
        loadFromSB();
      } else {
        // Try to exchange code from URL (PKCE flow)
        SBC.auth.exchangeCodeForSession(window.location.search).catch(function(){});
      }
    });
    SBC.auth.onAuthStateChange(function(event,session){
      SBU=session?session.user:null;
      if(event==="SIGNED_IN"&&SBU){
        setSS("synced");
        updateHdr();
        loadFromSB();
        hideLogin();
      }
      if(event==="SIGNED_OUT"){
        SBU=null;
        setSS("local");
        updateHdr();
      }
    });
  }catch(e){ console.warn("connectSB error:",e); }
}
function loadFromSB(){
  if(!SBC||!SBU) return;
  SBC.from("physio_data").select("*").eq("user_id",SBU.id).single().then(function(r){
    if(r.data){ DB=r.data.unit_data||initDB(); DATES=r.data.streak_dates||[]; }
    // ensure SR fields on loaded data
    UNITS.forEach(function(u){
      var e=DB[u.id]; if(!e) return;
      if(!e.srNext)     e.srNext="";
      if(!e.srInterval) e.srInterval=1;
      if(!e.srReps)     e.srReps=0;
      if(!e.srLast)     e.srLast="";
    });
    setSS("synced"); renderAll();
  });
}

  tags.forEach(function(t){if(ut.indexOf(t.title)<0)ut.push(t.title);});

  var html='<div style="display:flex;flex-direction:column;gap:12px">';
  html+='<div class="card">'+lbl("◎ WIEDERHOLUNGS-RADAR")+'<div style="font-size:12px;color:#64748b">Alle Lücken auf einen Blick. Tippe ✕ zum Entfernen.</div></div>';

  if(due.length){
    html+='<div class="card" style="border-color:#7f1d1d">'+lbl('<span style="color:#fca5a5">🔁 FÄLLIGE WIEDERHOLUNGEN ('+due.length+')</span>');
    due.forEach(function(u){
      var d=DB[u.id];
      html+='<div class="urow" data-a="ou" data-id="'+u.id+'" style="border-color:#7f1d1d;margin-bottom:5px">'
        +'<div class="dot" style="background:#ef4444"></div>'
        +'<div style="flex:1;min-width:0"><div style="font-size:13px;font-weight:600">LE'+u.id+' – '+u.title+'</div>'
        +'<div style="font-size:11px;color:#ef4444">Intervall: '+d.srInterval+'d · '+d.srReps+'× · ★'+d.score+'/5</div></div></div>';
    });
    html+='</div>';
  }

  gu.forEach(function(u){
    var d=DB[u.id];
    html+='<div class="card"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px"><div style="font-weight:600;font-size:14px">LE '+u.id+' – '+u.title+'</div>'+starsH(u.id,d.score)+'</div>';
    html+='<div style="display:flex;flex-wrap:wrap;gap:5px;margin-bottom:8px">';
    (d.tags||[]).forEach(function(tag,i){
      html+='<span class="tag">'+tag+'<span data-a="rt" data-id="'+u.id+'" data-idx="'+i+'" style="color:#ef4444;margin-left:4px;cursor:pointer;min-width:22px;text-align:center;font-size:16px">✕</span></span>';
    });
    html+='</div>'+(d.notes?'<div style="font-size:12px;color:#64748b;font-style:italic;border-left:2px solid #334155;padding-left:8px">'+d.notes+'</div>':"")+'</div>';
  });

  if(!gu.length&&!due.length) html+='<div class="card es"><div style="font-size:36px">✓</div><div style="font-weight:600">Keine Lücken eingetragen</div><div style="font-size:12px;color:#475569">Im Lehrplan Lücken-Tags hinzufügen</div></div>';

  if(tags.length){
    html+='<div class="card" style="border-color:#1d4ed8"><div style="font-size:12px;font-weight:600;color:#60a5fa;margin-bottom:10px">📋 WOCHENEND-CHECKLISTE</div>';
    ut.forEach(function(title){
      var cnt=tags.filter(function(t){return t.title===title;}).length;
      html+='<div style="display:flex;align-items:center;gap:8px;padding:8px 0;border-bottom:1px solid #1e293b;font-size:13px;min-height:44px">☐ '+title+' <span style="font-size:11px;color:#475569">('+cnt+' Lücken)</span></div>';
    });
    html+='</div>';
  }
  return html+'</div>';
}

// -- Timer ---------------------------------------------------------------------
function rTmr(){
  var col=T_MODE==="study"?(T_SEC>=10800?"#10b981":"#06b6d4"):"#10b981";
  var goal=T_MODE==="study"?10800:900;
  var p=Math.min(T_SEC/goal*100,100);
  return '<div style="display:flex;flex-direction:column;align-items:center;gap:16px">'
    +'<div class="card" style="width:100%;text-align:center;padding:32px">'
    +'<div style="font-size:11px;font-weight:700;color:#475569;letter-spacing:.15em;margin-bottom:16px">'+(T_MODE==="study"?"⚡ LERNPHASE":"☕ PAUSE")+'</div>'
    +'<div id="tdisp" class="mono tdisp" style="color:'+col+'">'+fmt(T_SEC)+'</div>'
    +'<div style="font-size:12px;color:#475569;margin-top:8px">'+(T_MODE==="study"?"Ziel: 3h":"Ziel: 15 Min")+'</div>'
    +'<div class="pb" style="margin-top:14px"><div class="pf" style="width:'+p+'%;background:'+col+'"></div></div></div>'
    +'<div style="display:flex;gap:10px;flex-wrap:wrap;justify-content:center">'
    +'<button data-a="tt" class="abtn" style="background:'+(T_RUN?"#7f1d1d":"#164e63")+';border-color:'+(T_RUN?"#ef4444":"#06b6d4")+';color:'+(T_RUN?"#fca5a5":"#67e8f9")+'">'+(T_RUN?"⏸ Pause":"▶ Start")+'</button>'
    +'<button data-a="tr" class="abtn" style="background:#1e293b;border-color:#334155;color:#94a3b8">↺ Reset</button>'
    +'<button data-a="tm" class="abtn" style="background:#1e293b;border-color:#334155;color:#94a3b8">'+(T_MODE==="study"?"☕ Pause":"⚡ Lernen")+'</button></div>'
    +'<div class="card" style="width:100%">'+lbl("SCHNELL-TIMER")+'<div style="display:flex;gap:8px;flex-wrap:wrap">'
    +[["1,5h",5400],["1h",3600],["30min",1800],["15min",900]].map(function(r){
      return '<button data-a="ts" data-val="'+r[1]+'" style="padding:10px 14px;border-radius:8px;background:#1e293b;border:1px solid #334155;color:#94a3b8;font-size:12px;min-height:44px">'+r[0]+'</button>';
    }).join("")+'</div></div></div>';
}

// -- Export --------------------------------------------------------------------
function rExp(){
  var mc1d=daysUntil(MC1),mc2d=daysUntil(MC2D),od=daysUntil(ORAL),s=streak();
  var p1d=P1.filter(function(u){return DB[u.id]&&DB[u.id].status==="done";}).length;
  var p2d=P2.filter(function(u){return DB[u.id]&&DB[u.id].status==="done";}).length;
  var dLEs=UNITS.filter(function(u){return DB[u.id]&&DB[u.id].status==="done";}).map(function(u){return "LE"+u.id;}).join(", ")||"–";
  var gLEs=UNITS.filter(function(u){return DB[u.id]&&DB[u.id].tags&&DB[u.id].tags.length>0;});
  var wLEs=UNITS.filter(function(u){return DB[u.id]&&DB[u.id].score>0&&DB[u.id].score<=2;});
  var nxt=UNITS.filter(function(u){return DB[u.id]&&DB[u.id].status!=="done";})[0];
  var due=srDue();
  var td=new Date().toLocaleDateString("de-DE");

  var txt="📚 PhysioTrack Status – "+td+"\n"
    +"──────────────────────\n"
    +"MC 1 (24.05.2026): "+mc1d+" Tage\n"
    +"MC 2 (07.07.2026): "+mc2d+" Tage\n"
    +"Mündliche (~15.08.2026): "+od+" Tage\n"
    +"🔥 Streak: "+s+" Tage\n"
    +"Phase 1: "+p1d+"/"+P1.length+" | Phase 2: "+p2d+"/"+P2.length+"\n\n"
    +"✅ Fertig: "+dLEs+"\n\n"
    +"(!)️ Lücken:\n"+(gLEs.length?gLEs.map(function(u){return "  • LE"+u.id+" "+u.title+": "+DB[u.id].tags.join(", ");}).join("\n"):"  –")+"\n\n"
    +"⭐ Unsicher (★1-2):\n"+(wLEs.length?wLEs.map(function(u){return "  • LE"+u.id+" "+u.title+" (★"+DB[u.id].score+"/5)";}).join("\n"):"  –")+"\n\n"
    +"🔁 SR fällig heute:\n"+(due.length?due.map(function(u){return "  • LE"+u.id+" "+u.title;}).join("\n"):"  –")+"\n\n"
    +"▶ Nächste: "+(nxt?"LE"+nxt.id+" – "+nxt.title:"Alle fertig! 🎉")+"\n"
    +"──────────────────────\n"
    +"Bitte hilf mir gezielt weiter.";

  return '<div style="display:flex;flex-direction:column;gap:14px">'
    +'<div class="card" style="border-color:#1d4ed8"><div style="font-size:13px;font-weight:600;color:#60a5fa;margin-bottom:8px">📤 SMART-EXPORT FÜR NEUE CHATS</div><div style="font-size:12px;color:#94a3b8;line-height:1.7">Kopiere diesen Text und füge ihn am Anfang eines neuen Chats ein.</div></div>'
    +'<pre id="etxt" class="mono" style="background:#0f172a;border:1px solid #334155;border-radius:12px;padding:16px;font-size:12px;color:#94a3b8;white-space:pre-wrap;line-height:1.7;word-break:break-word">'+txt+'</pre>'
    +'<button data-a="ce" style="padding:13px 24px;border-radius:12px;font-weight:700;font-size:14px;align-self:flex-start;background:#164e63;border:2px solid #06b6d4;color:#67e8f9;min-height:50px">📋 Kopieren</button></div>';
}

// -- Events --------------------------------------------------------------------
document.addEventListener("click", function(e){
  // Tabs
  var tb=e.target.closest(".tbtn[data-tab]");
  if(tb){
    TAB=tb.dataset.tab;
    document.querySelectorAll(".tbtn").forEach(function(b){b.classList.remove("on");});
    tb.classList.add("on");
    renderMain(); return;
  }
  // Stars
  var st=e.target.closest(".star[data-sv]");
  if(st){
    var row=st.closest("[data-stars]"); if(!row) return;
    var id=+row.dataset.stars, val=+st.dataset.sv;
    var newScore=DB[id].score===val?0:val;
    DB[id].score=newScore;
    if(newScore>0){ srUpdate(id,newScore); }
    saveData(); renderAll(); return;
  }
  // Actions
  var el=e.target.closest("[data-a]"); if(!el) return;
  var a=el.dataset.a;
  if(a==="mt"){ markToday(); renderMain(); }
  else if(a==="ou"){ SEL=+el.dataset.id; TAB="lp"; document.querySelectorAll(".tbtn").forEach(function(b){b.classList.remove("on");}); document.querySelector("[data-tab='lp']").classList.add("on"); renderMain(); }
  else if(a==="su"){ SEL=SEL===+el.dataset.id?null:+el.dataset.id; renderMain(); setTimeout(function(){var dp=document.getElementById("dp");if(dp)dp.scrollIntoView({behavior:"smooth",block:"nearest"});},50); }
  else if(a==="cu"){ SEL=null; renderMain(); }
  else if(a==="ss"){ DB[+el.dataset.id].status=el.dataset.val; saveData(); renderMain(); }
  else if(a==="rt"){ var uid=+el.dataset.id,idx=+el.dataset.idx; DB[uid].tags=DB[uid].tags.filter(function(_,i){return i!==idx;}); saveData(); renderMain(); }
  else if(a==="at"){ var inp=document.getElementById("ti"); if(!inp||!inp.value.trim())return; var uid=+el.dataset.id; DB[uid].tags=(DB[uid].tags||[]).concat([inp.value.trim()]); inp.value=""; saveData(); renderMain(); }
  else if(a==="cp"){ CAL_M--; if(CAL_M<0){CAL_M=11;CAL_Y--;} renderMain(); }
  else if(a==="cn"){ CAL_M++; if(CAL_M>11){CAL_M=0;CAL_Y++;} renderMain(); }
  else if(a==="tt"){
    T_RUN=!T_RUN;
    if(T_RUN){ markToday(); clearInterval(T_INT); T_INT=setInterval(function(){T_SEC++;var el=document.getElementById("tdisp");if(el)el.textContent=fmt(T_SEC);},1000); }
    else{ clearInterval(T_INT); }
    renderMain();
  }
  else if(a==="tr"){ clearInterval(T_INT); T_RUN=false; T_SEC=0; renderMain(); }
  else if(a==="tm"){ clearInterval(T_INT); T_RUN=false; T_SEC=0; T_MODE=T_MODE==="study"?"break":"study"; renderMain(); }
  else if(a==="ts"){ clearInterval(T_INT); T_RUN=false; T_SEC=+el.dataset.val; renderMain(); }
  else if(a==="ce"){
    var txt=document.getElementById("etxt");
    if(txt) navigator.clipboard.writeText(txt.textContent).then(function(){
      var btn=document.querySelector("[data-a='ce']");
      if(btn){btn.textContent="✓ Kopiert!";btn.style.background="#064e3b";btn.style.borderColor="#10b981";btn.style.color="#34d399";
        setTimeout(function(){btn.textContent="📋 Kopieren";btn.style.background="#164e63";btn.style.borderColor="#06b6d4";btn.style.color="#67e8f9";},2000);}
    }).catch(function(){alert("Bitte manuell kopieren.");});
  }
}, true);

document.addEventListener("change", function(e){
  if(!SEL) return;
  var t=e.target;
  if(t.id==="fp"){ DB[SEL].planned=t.value; saveData(); }
  if(t.id==="fc"){ DB[SEL].completed=t.value; DB[SEL].status="done"; saveData(); renderMain(); }
  if(t.id==="fn"){ DB[SEL].notes=t.value; saveData(); }
}, true);

document.addEventListener("keydown", function(e){
  if(e.key==="Enter"&&e.target.id==="ti"&&SEL){
    var v=e.target.value.trim(); if(!v) return;
    DB[SEL].tags=(DB[SEL].tags||[]).concat([v]); e.target.value=""; saveData(); renderMain();
  }
}, true);

// -- Login Modal ---------------------------------------------------------------
function showLogin(){
  var m=document.getElementById("login-modal");
  if(m){ m.style.display="flex"; }
}
function hideLogin(){
  var m=document.getElementById("login-modal");
  if(m){ m.style.display="none"; }
}
document.addEventListener("click",function(e){
  var el=e.target.closest("[data-a='login']");
  if(el){ if(SBU){ if(confirm("Ausloggen?")){ SBC.auth.signOut().then(function(){ SBU=null; setSS("local"); updateHdr(); }); } } else { showLogin(); } return; }
  if(e.target.id==="modal-close"||e.target.id==="modal-skip"){ hideLogin(); return; }
  if(e.target.id==="modal-send"){
    var msg=document.getElementById("modal-msg");
    var btn=document.getElementById("modal-send");
    if(!SBC){
      if(msg){ msg.textContent="Supabase nicht konfiguriert."; }
      return;
    }
    if(btn){ btn.disabled=true; btn.style.opacity="0.6"; }
    SBC.auth.signInWithOAuth({
      provider:"github",
      options:{ redirectTo: location.href }
    }).then(function(r){
      if(r.error){
        if(msg){ msg.textContent=r.error.message; }
        if(btn){ btn.disabled=false; btn.style.opacity="1"; }
      }
      // on success browser redirects automatically
    });
    return;
  }
},false);

// -- Boot ----------------------------------------------------------------------
function boot(){
  loadLocal();
  renderAll(); // render immediately with local data
  // try supabase after a short delay to not block render
  setTimeout(function(){
    try{ initSB(); } catch(e){ console.warn("SB init failed",e); }
  }, 500);
}

if(document.readyState==="loading"){
  document.addEventListener("DOMContentLoaded", boot);
} else {
  boot();
}
</script>
