// ── Data helpers ──────────────────────────────────────────────────────────────
function mkU(){return{status:"open",score:0,planned:"",completed:"",tags:[],notes:"",srNext:"",srInterval:1,srReps:0,srLast:""};}
function initDB(){var d={};UNITS.forEach(function(u){d[u.id]=mkU();});return d;}
function ensureFields(){
  UNITS.forEach(function(u){
    if(!DB[u.id])DB[u.id]=mkU();
    var e=DB[u.id];
    if(!e.srNext)e.srNext="";
    if(!e.srInterval)e.srInterval=1;
    if(!e.srReps)e.srReps=0;
    if(!e.srLast)e.srLast="";
    if(!e.tags)e.tags=[];
    if(!e.notes)e.notes="";
  });
}
function today(){return new Date().toISOString().split("T")[0];}
function daysUntil(d){return Math.ceil((new Date(d)-new Date())/86400000);}
function pct(units){var done=units.filter(function(u){return DB[u.id]&&DB[u.id].status==="done";}).length;return units.length?Math.round(done/units.length*100):0;}
function allTags(){var out=[];UNITS.forEach(function(u){var tags=DB[u.id]&&DB[u.id].tags||[];tags.forEach(function(t){out.push({tag:t,id:u.id,title:u.title});});});return out;}
function streak(){
  var sorted=[].concat(DATES).filter(function(v,i,a){return a.indexOf(v)===i;}).sort().reverse();
  if(!sorted.length)return 0;
  var cur=new Date();cur.setHours(0,0,0,0);
  var n=0;
  for(var i=0;i<90;i++){var s=cur.toISOString().split("T")[0];if(sorted.indexOf(s)>=0){n++;cur.setDate(cur.getDate()-1);}else if(i===0){cur.setDate(cur.getDate()-1);}else break;}
  return n;
}

function pad(n){return String(n).padStart(2,"0");}

// ── Spaced Repetition ─────────────────────────────────────────────────────────
function srUpdate(id,score){
  var u=DB[id],td=today();
  u.srLast=td;u.srReps=(u.srReps||0)+1;
  var iv;
  if(score<=2){iv=1;u.srReps=0;u.srInterval=1;}
  else if(score===3){iv=Math.max(2,Math.round((u.srInterval||1)*1.2));}
  else if(score===4){iv=Math.max(4,Math.round((u.srInterval||1)*2.0));}
  else{iv=Math.max(7,Math.round((u.srInterval||1)*2.5));}
  u.srInterval=iv;
  var next=new Date(td);next.setDate(next.getDate()+iv);
  u.srNext=next.toISOString().split("T")[0];
}
function srDue(){var td=today();return UNITS.filter(function(u){var d=DB[u.id];return d&&d.srNext&&d.srNext<=td;});}
function srSoon(){var td=today();var lim=new Date();lim.setDate(lim.getDate()+3);var ls=lim.toISOString().split("T")[0];return UNITS.filter(function(u){var d=DB[u.id];return d&&d.srNext&&d.srNext>td&&d.srNext<=ls;});}
function srDays(id){var d=DB[id];if(!d||!d.srNext)return null;return Math.ceil((new Date(d.srNext)-new Date())/86400000);}
function srBadge(id){var d=DB[id];if(!d||!d.srNext)return"";var days=srDays(id);if(days<=0)return'<span class="bdg" style="color:#ef4444;background:#450a0a">SR faellig</span>';if(days<=3)return'<span class="bdg" style="color:#f59e0b;background:#431407">SR '+days+'d</span>';return'<span class="bdg" style="color:#34d399;background:#052e16">SR '+days+'d</span>';}

// ── Supabase ──────────────────────────────────────────────────────────────────
function setSyncPill(txt,bg,col){
  var p=document.getElementById("sync-pill");
  if(p){p.textContent=txt;p.style.background=bg;p.style.color=col;p.style.borderColor=col;}
}
function loadSupabase(cb){
  if(typeof supabase!=="undefined"){cb();return;}
  var urls=[
    "https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js",
    "https://unpkg.com/@supabase/supabase-js@2/dist/umd/supabase.js"
  ];
  var i=0;
  function tryNext(){
    if(i>=urls.length){console.warn("Supabase CDN failed");cb(true);return;}
    var s=document.createElement("script");
    s.src=urls[i++];
    s.onload=function(){cb();};
    s.onerror=function(){tryNext();};
    document.head.appendChild(s);
  }
  tryNext();
}
function initSupabase(){
  if(SB_URL==="DEINE_SUPABASE_URL"){showApp();return;}
  loadSupabase(function(failed){
    if(failed){showApp();return;}
    try{
      SBC=supabase.createClient(SB_URL,SB_KEY,{auth:{persistSession:true,autoRefreshToken:true,detectSessionInUrl:true}});
      // Listen for auth changes
      SBC.auth.onAuthStateChange(function(event,session){
        SBU=session?session.user:null;
        if(event==="SIGNED_IN"){
          setSyncPill("&#9679; Synced","#052e16","#34d399");
          loadFromCloud();
        }
        if(event==="SIGNED_OUT"){
          SBU=null;
          setSyncPill("&#9679; Lokal","#1e293b","#64748b");
          updateHdr();
        }
      });
      // Check existing session
      SBC.auth.getSession().then(function(r){
        if(r.data&&r.data.session){
          SBU=r.data.session.user;
          setSyncPill("&#9679; Synced","#052e16","#34d399");
          loadFromCloud();
        }else{
          showApp();
        }
      });
    }catch(e){showApp();}
  });
}

function loadFromCloud(){
  if(!SBC||!SBU){showApp();return;}
  setSyncPill("Laedt...","#1e293b","#f59e0b");
  SBC.from("physio_data").select("*").eq("user_id",SBU.id).single().then(function(r){

      ensureFields();
      saveLocal();

function saveToCloud(){

  gu.forEach(function(u){var d=DB[u.id];html+='<div class="card"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px"><div style="font-weight:600;font-size:14px">LE '+u.id+' - '+u.title+'</div>'+starsH(u.id,d.score)+'</div><div style="display:flex;flex-wrap:wrap;gap:5px;margin-bottom:8px">';(d.tags||[]).forEach(function(tag,i){html+='<span class="tag">'+tag+'<span data-a="rt" data-id="'+u.id+'" data-idx="'+i+'" style="color:#ef4444;margin-left:4px;cursor:pointer;min-width:22px;text-align:center">x</span></span>';});html+='</div>'+(d.notes?'<div style="font-size:12px;color:#64748b;font-style:italic;border-left:2px solid #334155;padding-left:8px">'+d.notes+'</div>':"")+'</div>';});
  if(!gu.length&&!due.length)html+='<div class="card es"><div style="font-weight:600">Keine Luecken eingetragen</div></div>';
  if(tags.length){html+='<div class="card" style="border-color:#1d4ed8"><div style="font-size:12px;font-weight:600;color:#60a5fa;margin-bottom:10px">WOCHENEND-CHECKLISTE</div>';ut.forEach(function(title){var cnt=tags.filter(function(t){return t.title===title;}).length;html+='<div style="display:flex;align-items:center;gap:8px;padding:8px 0;border-bottom:1px solid #1e293b;font-size:13px;min-height:44px">[ ] '+title+' <span style="font-size:11px;color:#475569">('+cnt+')</span></div>';});html+='</div>';}
  return html+'</div>';
}

// ── Timer ─────────────────────────────────────────────────────────────────────
function rTmr(){
  var col=T_MODE==="study"?(T_SEC>=10800?"#10b981":"#06b6d4"):"#10b981";
  var goal=T_MODE==="study"?10800:900,p=Math.min(T_SEC/goal*100,100);
  return '<div style="display:flex;flex-direction:column;align-items:center;gap:16px"><div class="card" style="width:100%;text-align:center;padding:32px"><div style="font-size:11px;font-weight:700;color:#475569;letter-spacing:.15em;margin-bottom:16px">'+(T_MODE==="study"?"LERNPHASE":"PAUSE")+'</div><div id="tdisp" class="mono tdisp" style="color:'+col+'">'+fmt(T_SEC)+'</div><div style="font-size:12px;color:#475569;margin-top:8px">'+(T_MODE==="study"?"Ziel: 3h":"Ziel: 15 Min")+'</div><div class="pb" style="margin-top:14px"><div class="pf" style="width:'+p+'%;background:'+col+'"></div></div></div><div style="display:flex;gap:10px;flex-wrap:wrap;justify-content:center"><button data-a="tt" class="abtn" style="background:'+(T_RUN?"#7f1d1d":"#164e63")+';border-color:'+(T_RUN?"#ef4444":"#06b6d4")+';color:'+(T_RUN?"#fca5a5":"#67e8f9")+'">'+(T_RUN?"Pause":"Start")+'</button><button data-a="tr" class="abtn" style="background:#1e293b;border-color:#334155;color:#94a3b8">Reset</button><button data-a="tm" class="abtn" style="background:#1e293b;border-color:#334155;color:#94a3b8">'+(T_MODE==="study"?"Pause-Modus":"Lern-Modus")+'</button></div><div class="card" style="width:100%">'+lbl("SCHNELL-TIMER")+'<div style="display:flex;gap:8px;flex-wrap:wrap">'+[["1,5h",5400],["1h",3600],["30min",1800],["15min",900]].map(function(r){return'<button data-a="ts" data-val="'+r[1]+'" style="padding:10px 14px;border-radius:8px;background:#1e293b;border:1px solid #334155;color:#94a3b8;font-size:12px;min-height:44px">'+r[0]+'</button>';}).join("")+'</div></div></div>';
}

// ── Export ────────────────────────────────────────────────────────────────────
function rExp(){
  var mc1d=daysUntil(MC1),mc2d=daysUntil(MC2D),od=daysUntil(ORAL),s=streak();
  var p1d=P1.filter(function(u){return DB[u.id]&&DB[u.id].status==="done";}).length;
  var p2d=P2.filter(function(u){return DB[u.id]&&DB[u.id].status==="done";}).length;
  var dLEs=UNITS.filter(function(u){return DB[u.id]&&DB[u.id].status==="done";}).map(function(u){return"LE"+u.id;}).join(", ")||"-";
  var gLEs=UNITS.filter(function(u){return DB[u.id]&&DB[u.id].tags&&DB[u.id].tags.length>0;});
  var wLEs=UNITS.filter(function(u){return DB[u.id]&&DB[u.id].score>0&&DB[u.id].score<=2;});
  var nxt=UNITS.filter(function(u){return DB[u.id]&&DB[u.id].status!=="done";})[0];
  var due=srDue(),td=new Date().toLocaleDateString("de-DE");
  var txt="PhysioTrack Status - "+td+"\n----------------------\n"
    +"MC 1 (24.05.2026): "+mc1d+" Tage\nMC 2 (07.07.2026): "+mc2d+" Tage\nMuendliche (~15.08.2026): "+od+" Tage\n"
    +"Streak: "+s+" Tage\nPhase 1: "+p1d+"/"+P1.length+" | Phase 2: "+p2d+"/"+P2.length+"\n\n"
    +"Fertig: "+dLEs+"\n\nLuecken:\n"+(gLEs.length?gLEs.map(function(u){return"  LE"+u.id+" "+u.title+": "+DB[u.id].tags.join(", ");}).join("\n"):"  -")+"\n\n"
    +"Unsicher:\n"+(wLEs.length?wLEs.map(function(u){return"  LE"+u.id+" "+u.title+" ("+DB[u.id].score+"/5)";}).join("\n"):"  -")+"\n\n"
    +"SR faellig:\n"+(due.length?due.map(function(u){return"  LE"+u.id+" "+u.title;}).join("\n"):"  -")+"\n\n"
    +"Naechste: "+(nxt?"LE"+nxt.id+" - "+nxt.title:"Alle fertig!")+"\n----------------------\nBitte hilf mir gezielt weiter.";
  return '<div style="display:flex;flex-direction:column;gap:14px"><div class="card" style="border-color:#1d4ed8"><div style="font-size:13px;font-weight:600;color:#60a5fa;margin-bottom:8px">SMART-EXPORT</div><div style="font-size:12px;color:#94a3b8;line-height:1.7">Kopiere diesen Text fuer einen neuen Chat.</div></div><pre id="etxt" class="mono" style="background:#0f172a;border:1px solid #334155;border-radius:12px;padding:16px;font-size:12px;color:#94a3b8;white-space:pre-wrap;line-height:1.7;word-break:break-word">'+txt+'</pre><button data-a="ce" style="padding:13px 24px;border-radius:12px;font-weight:700;font-size:14px;align-self:flex-start;background:#164e63;border:2px solid #06b6d4;color:#67e8f9;min-height:50px">Kopieren</button>'+(SBU?'<button data-a="logout" style="padding:10px 16px;border-radius:8px;background:#1e293b;border:1px solid #334155;color:#64748b;font-size:12px;min-height:44px;align-self:flex-start">GitHub abmelden</button>':"")+  '</div>';
}

// ── Events ────────────────────────────────────────────────────────────────────
document.addEventListener("click",function(e){
  var tb=e.target.closest(".tbtn[data-tab]");
  if(tb){TAB=tb.dataset.tab;document.querySelectorAll(".tbtn").forEach(function(b){b.classList.remove("on");});tb.classList.add("on");renderMain();return;}
  var st=e.target.closest(".star[data-sv]");
  if(st){var row=st.closest("[data-stars]");if(!row)return;var id=+row.dataset.stars,val=+st.dataset.sv,ns=DB[id].score===val?0:val;DB[id].score=ns;if(ns>0)srUpdate(id,ns);saveData();renderAll();return;}
  var el=e.target.closest("[data-a]");if(!el)return;
  var a=el.dataset.a;
  if(a==="mt"){markToday();renderMain();}
  else if(a==="login"){loginWithGitHub();}
  else if(a==="logout"){logout();renderMain();}
  else if(a==="sync-info"){if(SBU){if(confirm("GitHub abmelden?")){logout();renderMain();}}else{loginWithGitHub();}}
  else if(a==="ou"){SEL=+el.dataset.id;TAB="lp";document.querySelectorAll(".tbtn").forEach(function(b){b.classList.remove("on");});document.querySelector("[data-tab='lp']").classList.add("on");renderMain();}
  else if(a==="su"){SEL=SEL===+el.dataset.id?null:+el.dataset.id;renderMain();setTimeout(function(){var dp=document.getElementById("dp");if(dp)dp.scrollIntoView({behavior:"smooth",block:"nearest"});},50);}
  else if(a==="cu"){SEL=null;renderMain();}
  else if(a==="ss"){DB[+el.dataset.id].status=el.dataset.val;saveData();renderMain();}
  else if(a==="rt"){var uid=+el.dataset.id,idx=+el.dataset.idx;DB[uid].tags=DB[uid].tags.filter(function(_,i){return i!==idx;});saveData();renderMain();}
  else if(a==="at"){var inp=document.getElementById("ti");if(!inp||!inp.value.trim())return;var aid=+el.dataset.id;DB[aid].tags=(DB[aid].tags||[]).concat([inp.value.trim()]);inp.value="";saveData();renderMain();}
  else if(a==="cp"){CAL_M--;if(CAL_M<0){CAL_M=11;CAL_Y--;}renderMain();}
  else if(a==="cn"){CAL_M++;if(CAL_M>11){CAL_M=0;CAL_Y++;}renderMain();}
  else if(a==="tt"){T_RUN=!T_RUN;if(T_RUN){markToday();clearInterval(T_INT);T_INT=setInterval(function(){T_SEC++;var el2=document.getElementById("tdisp");if(el2)el2.textContent=fmt(T_SEC);},1000);}else{clearInterval(T_INT);}renderMain();}
  else if(a==="tr"){clearInterval(T_INT);T_RUN=false;T_SEC=0;renderMain();}
  else if(a==="tm"){clearInterval(T_INT);T_RUN=false;T_SEC=0;T_MODE=T_MODE==="study"?"break":"study";renderMain();}
  else if(a==="ts"){clearInterval(T_INT);T_RUN=false;T_SEC=+el.dataset.val;renderMain();}
  else if(a==="ce"){var etxt=document.getElementById("etxt");if(etxt)navigator.clipboard.writeText(etxt.textContent).then(function(){var btn=document.querySelector("[data-a='ce']");if(btn){btn.textContent="Kopiert!";btn.style.background="#064e3b";btn.style.borderColor="#10b981";btn.style.color="#34d399";setTimeout(function(){btn.textContent="Kopieren";btn.style.background="#164e63";btn.style.borderColor="#06b6d4";btn.style.color="#67e8f9";},2000);}}).catch(function(){alert("Bitte manuell kopieren.");});}
},true);
document.addEventListener("change",function(e){
  if(!SEL)return;
  var t=e.target;
  if(t.id==="fp"){DB[SEL].planned=t.value;saveData();}
  if(t.id==="fc"){DB[SEL].completed=t.value;DB[SEL].status="done";saveData();renderMain();}
  if(t.id==="fn"){DB[SEL].notes=t.value;saveData();}
},true);
document.addEventListener("keydown",function(e){
  if(e.key==="Enter"&&e.target.id==="ti"&&SEL){var v=e.target.value.trim();if(!v)return;DB[SEL].tags=(DB[SEL].tags||[]).concat([v]);e.target.value="";saveData();renderMain();}
},true);

// ── Boot ──────────────────────────────────────────────────────────────────────
loadLocal();
document.getElementById("loading-msg").textContent="Verbinde...";
initSupabase();
</script>
</body>
