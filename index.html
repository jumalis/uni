<!DOCTYPE html>

<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PhysioTrack – MHH</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;background:#070d1c;color:#e2e8f0;font-family:'IBM Plex Sans',system-ui,sans-serif;-webkit-font-smoothing:antialiased}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:#0f172a}::-webkit-scrollbar-thumb{background:#334155;border-radius:4px}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
input,textarea,select{font-family:inherit;color:#e2e8f0;background:#1e293b;border:1px solid #334155;border-radius:8px;outline:none}
input[type=date]::-webkit-calendar-picker-indicator{filter:invert(0.4)}
.card{background:#0f172a;border:1px solid #1e293b;border-radius:12px;padding:16px}
.mono{font-family:'IBM Plex Mono',monospace}
.tag{display:inline-flex;align-items:center;gap:4px;background:#1e3a5f;border:1px solid #1d4ed8;border-radius:20px;padding:2px 10px;font-size:12px;color:#93c5fd;cursor:pointer}
.unit-row{display:flex;align-items:center;gap:8px;padding:9px 10px;border-radius:10px;background:#0f172a;border:1px solid #1e293b;margin-bottom:4px;cursor:pointer;transition:background .15s}
.unit-row:hover{background:#162032}
.unit-row.active{background:#1e3a5f;border-color:#1d4ed8}
.tab-btn{padding:6px 14px;border-radius:8px;font-size:13px;display:flex;align-items:center;gap:6px;white-space:nowrap;border-bottom:2px solid transparent;transition:all .15s;color:#64748b}
.tab-btn.active{background:#1e3a5f;color:#38bdf8;border-bottom-color:#0ea5e9;font-weight:600}
.tab-btn:hover:not(.active){background:#1a2744}
.pill{display:inline-flex;align-items:center;gap:5px;padding:4px 10px;border-radius:20px;font-size:12px;font-weight:600;white-space:nowrap}
.status-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0}
.star{font-size:16px;cursor:pointer;user-select:none;transition:color .15s}
.cal-day{border-radius:8px;padding:6px;min-height:60px;background:#0f172a;border:1px solid #1e293b;font-size:10px}
.cal-day.has-plan{border-color:#1d4ed8}
.cal-day.today{background:#0c4a6e;border-color:#06b6d4}
#detail-panel{position:sticky;top:76px;align-self:start;max-height:calc(100vh - 100px);overflow-y:auto}
@media(max-width:640px){.hide-sm{display:none!important}.tab-btn{padding:6px 10px;font-size:12px}}
</style>
</head>
<body>

<!-- HEADER -->

<header style="background:#0a1628;border-bottom:1px solid #1e293b;padding:10px 16px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;gap:8px">
  <div style="display:flex;align-items:center;gap:10px">
    <div style="width:34px;height:34px;background:linear-gradient(135deg,#0e7490,#1d4ed8);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0">⚕</div>
    <div class="hide-sm">
      <div class="mono" style="font-weight:600;font-size:14px;color:#f1f5f9;letter-spacing:.05em">PhysioTrack</div>
      <div style="font-size:10px;color:#475569">MHH · HannibaL 2025/26</div>
    </div>
  </div>
  <div style="display:flex;gap:6px;align-items:center;flex-wrap:wrap;justify-content:flex-end">
    <span id="sync-dot" style="font-size:11px;color:#334155">● Gespeichert</span>
    <span id="pill-streak" class="pill" style="background:#431407;border:1px solid #9a3412;color:#fed7aa">🔥 0</span>
    <span id="pill-mc1" class="pill" style="border:1px solid #10b981;color:#10b981">⏱ MC1 –d</span>
    <span id="pill-mc2" class="pill" style="border:1px solid #f59e0b;color:#f59e0b">📋 MC2 –d</span>
    <span class="pill" style="background:#1e1b4b;border:1px solid #4338ca;color:#a5b4fc">🎓 <span id="pill-oral">–</span>d</span>
    <button onclick="resetData()" style="background:#1e293b;border:1px solid #334155;border-radius:8px;color:#64748b;padding:4px 8px;font-size:11px">🗑 Reset</button>
  </div>
</header>

<!-- NAV -->

<nav style="display:flex;gap:2px;padding:6px 12px;background:#090f1e;border-bottom:1px solid #1e293b;overflow-x:auto">
  <button class="tab-btn active" onclick="showTab('dashboard')" id="tab-dashboard">▦ <span class="hide-sm">Dashboard</span></button>
  <button class="tab-btn" onclick="showTab('lehrplan')"  id="tab-lehrplan">≡ <span class="hide-sm">Lehrplan</span></button>
  <button class="tab-btn" onclick="showTab('kalender')"  id="tab-kalender">⊞ <span class="hide-sm">Kalender</span></button>
  <button class="tab-btn" onclick="showTab('radar')"     id="tab-radar">◎ <span class="hide-sm">Radar</span></button>
  <button class="tab-btn" onclick="showTab('timer')"     id="tab-timer">◷ <span class="hide-sm">Timer</span></button>
  <button class="tab-btn" onclick="showTab('export')"    id="tab-export">↑ <span class="hide-sm">Export</span></button>
</nav>

<!-- MAIN -->

<main id="main" style="padding:16px;max-width:900px;margin:0 auto"></main>

<script>
// ─── DATA ────────────────────────────────────────────────────────────────────
const MC1 = new Date("2026-05-24");
const MC2 = new Date("2026-07-07");
const ORAL= new Date("2026-08-15");

const UNITS = [
  {id:1, p:1,mc2:false,rev:false,title:"Blut",                       topics:["Blutbestandteile & Hämatopoese","Blutgruppen (AB0, Rhesus)","Hämostase & Gerinnung","Blutbild (Hb, Hk, MCV)","Plasmapuffer"]},
  {id:2, p:1,mc2:false,rev:false,title:"Herz 1 – EKG / Dipol",       topics:["Erregungsausbreitung (SA→AV→His)","AP Herzmuskel vs. Schrittmacher","EKG-Ableitungen (Einthoven, Goldberger)","P-QRS-T, Lagetypen, Achse","Dipol-Konzept"]},
  {id:3, p:1,mc2:false,rev:false,title:"Herz 2",                      topics:["Herzzyklus & Phasen","Druck-Volumen-Diagramm","HMV, Schlagvolumen, EF","Frank-Starling-Mechanismus","Koronardurchblutung"]},
  {id:4, p:1,mc2:false,rev:false,title:"Kreislauf 1 – Strömung",      topics:["Hagen-Poiseuille-Gesetz","Laminare vs. turbulente Strömung","Laplace-Gesetz","Windkesselfunktion der Aorta"]},
  {id:5, p:1,mc2:false,rev:false,title:"Kreislauf 2",                 topics:["Blutdruckregulation (kurz/mittel/lang)","Barorezeptoren & RAAS","Starling-Kräfte","Schock-Formen & Kompensation"]},
  {id:6, p:1,mc2:false,rev:false,title:"Atmung",                      topics:["Lungenvolumina & -kapazitäten","Compliance, Resistance, Atemarbeit","Gasaustausch & V/Q-Verhältnis","Hb-Dissoziationskurve","Atemregulation"]},
  {id:7, p:1,mc2:false,rev:false,title:"Salz-Wasser-Haushalt",        topics:["Körperwasser-Kompartimente","GFR & Clearance (Kreatinin, Inulin)","Na⁺/K⁺-Regulation, ADH, Aldosteron","Konzentrierungs- & Verdünnungsleistung"]},
  {id:8, p:1,mc2:false,rev:false,title:"Säuren-Basen / Energieumsatz",topics:["Henderson-Hasselbalch-Gleichung","Puffersysteme","Metabolische/respiratorische Störungen","Kompensationsmechanismen","Ergometrie, O₂-Schuld, Laktat"]},
  {id:9, p:1,mc2:false,rev:true, title:"Generalwdh. I",               topics:["Blut, Herz 1+2 – MC-Fragen & Lücken"]},
  {id:10,p:1,mc2:false,rev:true, title:"Generalwdh. II",              topics:["Kreislauf, Atmung – MC-Fragen"]},
  {id:11,p:1,mc2:false,rev:true, title:"Generalwdh. III (Finale)",    topics:["Alle 8 MC-Themen – Schwachstellen"]},
  {id:12,p:2,mc2:false,rev:false,title:"Nerv 1",                      topics:["Ruhemembranpotenzial & Nernst-Gleichung","Ionenkanäle, Ohm, Leitfähigkeit","Aktionspotenzial: Phasen & Refraktärzeit","Empfindungsschwellen"]},
  {id:13,p:2,mc2:false,rev:false,title:"Nerv 2",                      topics:["Nervenleitgeschwindigkeit (NLG)","Elektroneurographie & EMG","N. ulnaris & N. medianus","Saltatorische Leitung"]},
  {id:14,p:2,mc2:false,rev:false,title:"Mechanik / Wärme",            topics:["Hebelgesetze & Drehmoment","Muskelkraft bei variablem Kraftarm","Wärmekapazität & Verdunstung","Schwitzen & Konvektion"]},
  {id:15,p:2,mc2:false,rev:false,title:"Muskel 1",                    topics:["Kraft-Geschwindigkeits-Beziehung (Hill)","Kurve der Unterstützungsmaxima","Muskelarbeit & -leistung","Glatte Muskulatur & Transmitter"]},
  {id:16,p:2,mc2:false,rev:false,title:"Muskel 2",                    topics:["Isometrische Kontraktion & Kraft-Länge","Einzelzuckung → Superposition → Tetanus","Querbrückenzyklus & Ca²⁺","Motorische Einheit"]},
  {id:17,p:2,mc2:false,rev:true, title:"Auffrischung Phase 1",        topics:["Herz, Kreislauf, Atmung – mündliches Niveau"]},
  {id:18,p:2,mc2:true, rev:false,title:"Akustik",                     topics:["Schallwellen: Longitudinal/Transversal","Schallintensität & Schalldruckpegel (dB)","Resonanz, Reflexion, stehende Wellen","Doppler-Effekt"]},
  {id:19,p:2,mc2:true, rev:false,title:"Ohr",                         topics:["Anatomie Außen-/Mittel-/Innenohr","Impedanzanpassung","Cochlea, Wanderwelle, Haarzellen","Audiometrie & Schwerhörigkeit"]},
  {id:20,p:2,mc2:true, rev:false,title:"Optik / Auge",                topics:["Brechung & Linsengleichung","Akkommodation & Refraktionsfehler","Phototransduktion (Stäbchen/Zapfen)","Gesichtsfeld & Farbsehen"]},
  {id:21,p:2,mc2:true, rev:false,title:"ZNS",                         topics:["Reflexe, Babinski-Zeichen","Renshaw- & autogene Hemmung","Muskelspindel & γ-Innervation","Sinnesphysiologie & Nozizeption","Pupillenreflex"]},
  {id:22,p:2,mc2:true, rev:false,title:"Bildgebende Diagnostik",      topics:["CT & Hounsfield-Einheiten, Fenstertechnik","MRT: T1/T2-Relaxation, Spin-Echo","Ultraschall: B-Mode, M-Mode, Piezo"]},
  {id:23,p:2,mc2:false,rev:true, title:"Blut + SWH + SBH Vertiefung",topics:["Klinische Fälle & Querverbindungen","Mündliche Simulation"]},
  {id:24,p:2,mc2:false,rev:true, title:"GenWdh: Nerv, Muskel, Mechanik",topics:[]},
  {id:25,p:2,mc2:false,rev:true, title:"GenWdh: Herz, Kreislauf, Atmung",topics:[]},
  {id:26,p:2,mc2:false,rev:true, title:"GenWdh: ZNS, Sinne, Bildgebung",topics:[]},
  {id:27,p:2,mc2:false,rev:true, title:"Prüfungssimulation I",        topics:["Mündliche Fragen laut üben"]},
  {id:28,p:2,mc2:false,rev:true, title:"Prüfungssimulation II",       topics:["Alle Lücken schließen"]},
];

const SC = {open:"#334155",working:"#d97706",done:"#059669",gaps:"#dc2626"};
const SL = {open:"○ Offen",working:"◑ In Arbeit",done:"● Fertig",gaps:"⚠ Lücken"};

// ─── STATE ───────────────────────────────────────────────────────────────────
let state = {
  units: {},   // {id: {status, score, planned, completed, tags, notes}}
  dates: [],   // streak dates
  selId: null,
  currentTab: "dashboard",
  timerSec: 0,
  timerRunning: false,
  timerMode: "study",
  calMonth: new Date().getMonth(),
  calYear: new Date().getFullYear(),
};

function mkUnit(){return {status:"open",score:0,planned:"",completed:"",tags:[],notes:""};}
function initUnits(){const u={};UNITS.forEach(x=>{u[x.id]=mkUnit();});return u;}

// ─── STORAGE ─────────────────────────────────────────────────────────────────
let saveTimeout;
function load(){
  try{
    const d=localStorage.getItem("physio_v2");
    if(d){const p=JSON.parse(d);state.units=p.units||initUnits();state.dates=p.dates||[];}
    else{state.units=initUnits();state.dates=[];}
  }catch{state.units=initUnits();state.dates=[];}
}
function save(){
  const dot=document.getElementById("sync-dot");
  if(dot){dot.style.color="#f59e0b";dot.textContent="● Speichert…";}
  clearTimeout(saveTimeout);
  saveTimeout=setTimeout(()=>{
    try{localStorage.setItem("physio_v2",JSON.stringify({units:state.units,dates:state.dates}));
    if(dot){dot.style.color="#334155";dot.textContent="● Gespeichert";}}
    catch(e){if(dot){dot.style.color="#ef4444";dot.textContent="● Fehler";}}
  },500);
}
function resetData(){if(confirm("Alle Daten zurücksetzen?")){localStorage.removeItem("physio_v2");state.units=initUnits();state.dates=[];render();}}

// ─── COMPUTED ────────────────────────────────────────────────────────────────
function daysUntil(d){return Math.ceil((new Date(d)-new Date())/86400000);}
function streak(){
  const sorted=[...new Set(state.dates)].sort().reverse();
  if(!sorted.length)return 0;
  const cur=new Date();cur.setHours(0,0,0,0);
  let c=0;
  for(let i=0;i<90;i++){
    const s=cur.toISOString().split("T")[0];
    if(sorted.includes(s)){c++;cur.setDate(cur.getDate()-1);}
    else if(i===0)cur.setDate(cur.getDate()-1);
    else break;
  }
  return c;
}
function pct(units){
  const done=units.filter(u=>state.units[u.id]?.status==="done").length;
  return units.length?Math.round(done/units.length*100):0;
}
const p1units=UNITS.filter(u=>u.p===1);
const p2units=UNITS.filter(u=>u.p===2);
const mc2units=UNITS.filter(u=>u.mc2);
function allTags(){return UNITS.flatMap(u=>(state.units[u.id]?.tags||[]).map(t=>({tag:t,id:u.id,title:u.title})));}

// ─── RING SVG ────────────────────────────────────────────────────────────────
function ring(pct,size,color,label,sub){
  const stroke=size>80?10:8,r=(size-stroke)/2,circ=2*Math.PI*r,dash=(pct/100)*circ;
  return `<div style="position:relative;width:${size}px;height:${size}px;flex-shrink:0">
    <svg width="${size}" height="${size}" style="transform:rotate(-90deg)">
      <circle cx="${size/2}" cy="${size/2}" r="${r}" fill="none" stroke="#1e293b" stroke-width="${stroke}"/>
      <circle cx="${size/2}" cy="${size/2}" r="${r}" fill="none" stroke="${color}" stroke-width="${stroke}"
        stroke-dasharray="${dash} ${circ}" stroke-linecap="round"/>
    </svg>
    <div style="position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center">
      <span class="mono" style="font-size:${size>80?17:12}px;font-weight:700;color:#f1f5f9">${label}</span>
      ${sub?`<span style="font-size:10px;color:#64748b;margin-top:1px">${sub}</span>`:""}
    </div>
  </div>`;
}

// ─── STARS HTML ──────────────────────────────────────────────────────────────
function starsHTML(unitId,score){
  return [1,2,3,4,5].map(i=>
    `<span class="star" style="color:${i<=score?"#f59e0b":"#334155"}" onclick="event.stopPropagation();setScore(${unitId},${i}===${score}?0:${i})">${i<=score?"★":"☆"}</span>`
  ).join("");
}

function fmt(s){return String(Math.floor(s/3600)).padStart(2,"0")+":"+String(Math.floor((s%3600)/60)).padStart(2,"0")+":"+String(s%60).padStart(2,"0");}

// ─── TABS ────────────────────────────────────────────────────────────────────
function showTab(name){
  state.currentTab=name;
  document.querySelectorAll(".tab-btn").forEach(b=>b.classList.remove("active"));
  document.getElementById("tab-"+name).classList.add("active");
  renderMain();
}

// ─── RENDER ──────────────────────────────────────────────────────────────────
function render(){updateHeader();renderMain();}

function updateHeader(){
  const s=streak(),mc1d=daysUntil(MC1),mc2d=daysUntil(MC2),orald=daysUntil(ORAL);
  document.getElementById("pill-streak").textContent="🔥 "+s;
  const mc1c=mc1d<7?"#ef4444":mc1d<28?"#f59e0b":"#10b981";
  const mc2c=mc2d<7?"#ef4444":mc2d<28?"#f59e0b":"#10b981";
  const p1=document.getElementById("pill-mc1");p1.textContent="⏱ MC1 "+mc1d+"d";p1.style.borderColor=mc1c;p1.style.color=mc1c;
  const p2=document.getElementById("pill-mc2");p2.textContent="📋 MC2 "+mc2d+"d";p2.style.borderColor=mc2c;p2.style.color=mc2c;
  document.getElementById("pill-oral").textContent=orald;
}

function renderMain(){
  const main=document.getElementById("main");
  switch(state.currentTab){
    case "dashboard": main.innerHTML=renderDashboard(); break;
    case "lehrplan":  main.innerHTML=renderLehrplan();  attachLehrplanEvents(); break;
    case "kalender":  main.innerHTML=renderKalender();  break;
    case "radar":     main.innerHTML=renderRadar();     break;
    case "timer":     main.innerHTML=renderTimer();     break;
    case "export":    main.innerHTML=renderExport();    break;
  }
}

// ─── DASHBOARD ───────────────────────────────────────────────────────────────
function renderDashboard(){
  const mc1d=daysUntil(MC1),mc2d=daysUntil(MC2),orald=daysUntil(ORAL);
  const p1d=p1units.filter(u=>state.units[u.id]?.status==="done").length;
  const mc2d_=mc2units.filter(u=>state.units[u.id]?.status==="done").length;
  const p2d=p2units.filter(u=>state.units[u.id]?.status==="done").length;
  const totd=p1d+p2d;
  const s=streak();
  const tags=allTags();

  const nextUnits=UNITS.filter(u=>state.units[u.id]?.status!=="done").slice(0,5);

  // Streak grid
  const today=new Date().toISOString().split("T")[0];
  let streakGrid="";
  for(let i=29;i>=0;i--){
    const d=new Date();d.setDate(d.getDate()-i);
    const ds=d.toISOString().split("T")[0];
    const studied=state.dates.includes(ds);
    const isToday=ds===today;
    streakGrid+=`<div title="${ds}" style="width:26px;height:26px;border-radius:6px;background:${studied?"#0e7490":"#1e293b"};border:1px solid ${isToday?"#06b6d4":studied?"#0284c7":"#334155"};display:flex;align-items:center;justify-content:center;font-size:9px;color:${studied?"#67e8f9":"#334155"}" class="mono">${d.getDate()}</div>`;
  }

  return `
  <div style="display:flex;flex-direction:column;gap:14px">

    <!-- Rings -->
    <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:10px">
      ${[
        [pct(p1units),"MC 1","#06b6d4",p1d+"/"+p1units.length,mc1d+"d",mc1d<7?"#ef4444":mc1d<28?"#f59e0b":"#10b981"],
        [pct(mc2units),"MC 2","#f59e0b",mc2d_+"/"+mc2units.length,mc2d+"d",mc2d<7?"#ef4444":mc2d<28?"#f59e0b":"#10b981"],
        [pct(p2units),"Mündl.","#8b5cf6",p2d+"/"+p2units.length,orald+"d","#a5b4fc"],
        [Math.round(totd/UNITS.length*100),"Gesamt","#10b981",totd+"/"+UNITS.length,Math.round(totd/UNITS.length*100)+"%","#34d399"],
      ].map(([p,sub,col,lbl,day,dc])=>`
        <div class="card" style="display:flex;flex-direction:column;align-items:center;gap:8px;padding:14px">
          ${ring(p,90,col,lbl,sub)}
          <span style="font-size:11px;color:${dc};font-weight:600">${day}</span>
        </div>`).join("")}
    </div>

    <!-- Ampel -->
    <div class="card">
      <div style="font-size:11px;font-weight:700;color:#475569;letter-spacing:.1em;margin-bottom:10px">PRÜFUNGS-AMPEL</div>
      ${[
        ["MC 1 – 24.05.2026",p1d,p1units.length,mc1d,"#06b6d4"],
        ["MC 2 – 07.07.2026",mc2d_,mc2units.length,mc2d,"#f59e0b"],
        ["Mündliche – ~15.08.2026",totd,UNITS.length,orald,"#8b5cf6"],
      ].map(([lbl,done,tot,days,col])=>{
        const p=Math.round(done/tot*100);
        const amp=days<7?"🔴":days<28?"🟡":"🟢";
        return `<div style="background:#1e293b;border-radius:10px;padding:12px;margin-bottom:8px">
          <div style="display:flex;justify-content:space-between;margin-bottom:4px">
            <span style="font-size:12px;font-weight:600">${amp} ${lbl}</span>
            <span class="mono" style="font-size:12px;color:${col}">${done}/${tot}</span>
          </div>
          <div style="background:#0f172a;border-radius:6px;height:8px;overflow:hidden">
            <div style="height:100%;background:${col};width:${p}%;border-radius:6px;transition:width .6s"></div>
          </div>
          <div style="font-size:11px;color:#475569;margin-top:4px">Noch ${tot-done} LE · ${days} Tage verbleibend</div>
        </div>`;
      }).join("")}
    </div>

    <!-- Streak -->
    <div class="card">
      <div style="font-size:11px;font-weight:700;color:#475569;letter-spacing:.1em;margin-bottom:10px">🔥 LERN-STREAK – LETZTE 30 TAGE (${s} in Folge)</div>
      <div style="display:flex;gap:3px;flex-wrap:wrap">${streakGrid}</div>
      <button onclick="markToday()" style="margin-top:10px;padding:6px 14px;background:#164e63;border:1px solid #0e7490;border-radius:8px;color:#67e8f9;font-size:12px;font-weight:600">Heute als gelernt markieren</button>
    </div>

    ${tags.length?`
    <!-- Lücken -->
    <div class="card">
      <div style="font-size:11px;font-weight:700;color:#475569;letter-spacing:.1em;margin-bottom:10px">⚠ OFFENE LÜCKEN (${tags.length})</div>
      <div style="display:flex;flex-wrap:wrap;gap:6px">
        ${tags.slice(0,12).map(t=>`<span class="tag">⚡ ${t.tag} <span style="color:#475569;font-size:10px">(${t.title})</span></span>`).join("")}
        ${tags.length>12?`<span style="color:#475569;font-size:12px;align-self:center">+${tags.length-12} → Radar</span>`:""}
      </div>
    </div>`:""}

// ─── KALENDER ────────────────────────────────────────────────────────────────
function renderKalender(){
const {calMonth:month,calYear:year}=state;
const first=new Date(year,month,1),last=new Date(year,month+1,0);
const startDay=(first.getDay()||7)-1;
const planned={};
UNITS.forEach(u=>{
const d=state.units[u.id];
if(d.planned){if(!planned[d.planned])planned[d.planned]=[];planned[d.planned].push(u);}
});
const mNames=[“Januar”,“Februar”,“März”,“April”,“Mai”,“Juni”,“Juli”,“August”,“September”,“Oktober”,“November”,“Dezember”];
let cells=””;
for(let i=0;i<startDay;i++)cells+=”<div></div>”;
const today=new Date().toISOString().split(“T”)[0];
for(let day=1;day<=last.getDate();day++){
const ds=`${year}-${String(month+1).padStart(2,"0")}-${String(day).padStart(2,"0")}`;
const us=planned[ds]||[];
cells+=`<div class="cal-day${us.length?" has-plan":""}${ds===today?" today":""}"> <div class="mono" style="font-weight:${ds===today?700:400};color:${ds===today?"#67e8f9":"#64748b"};margin-bottom:2px">${day}</div> ${us.map(u=>`<div style="font-size:9px;padding:1px 3px;border-radius:3px;margin-bottom:1px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;background:${SC[state.units[u.id].status]}22;color:${SC[state.units[u.id].status]};border:1px solid ${SC[state.units[u.id].status]}44">LE${u.id} ${u.title.substring(0,8)}</div>`).join("")} </div>`;
}
return `

  <div style="display:flex;align-items:center;gap:12px;margin-bottom:12px">
    <button onclick="calNav(-1)" style="background:#1e293b;border:1px solid #334155;border-radius:8px;color:#94a3b8;padding:5px 12px;font-size:16px">‹</button>
    <div style="font-weight:700;font-size:15px;flex:1;text-align:center">${mNames[month]} ${year}</div>
    <button onclick="calNav(1)"  style="background:#1e293b;border:1px solid #334155;border-radius:8px;color:#94a3b8;padding:5px 12px;font-size:16px">›</button>
  </div>
  <div style="display:grid;grid-template-columns:repeat(7,1fr);gap:2px;margin-bottom:4px">
    ${["Mo","Di","Mi","Do","Fr","Sa","So"].map(d=>`<div style="text-align:center;font-size:10px;color:#475569;font-weight:700;padding:4px 0">${d}</div>`).join("")}
  </div>
  <div style="display:grid;grid-template-columns:repeat(7,1fr);gap:2px">${cells}</div>`;
}
function calNav(dir){
  state.calMonth+=dir;
  if(state.calMonth>11){state.calMonth=0;state.calYear++;}
  if(state.calMonth<0){state.calMonth=11;state.calYear--;}
  renderMain();
}

let timerInterval;
function renderTimer(){
const {timerSec:sec,timerMode:mode}=state;
const goal=mode===“study”?10800:900;
const pctVal=Math.min(sec/goal*100,100);
const col=mode===“study”?(sec>=goal?”#10b981”:”#06b6d4”):”#10b981”;
return `

  <div style="display:flex;flex-direction:column;align-items:center;gap:16px">
    <div class="card" style="width:100%;text-align:center;padding:32px">
      <div style="font-size:11px;font-weight:700;color:#475569;letter-spacing:.15em;margin-bottom:14px">${mode==="study"?"⚡ LERNPHASE":"☕ PAUSE"}</div>
      <div id="timer-display" class="mono" style="font-size:clamp(40px,12vw,64px);font-weight:600;color:${col};letter-spacing:.05em;line-height:1">${fmt(sec)}</div>
      <div style="font-size:12px;color:#475569;margin-top:8px">${mode==="study"?"Ziel: 3h Lerneinheit":"Empfohlen: 15 Min"}</div>
      <div style="margin-top:14px;background:#1e293b;border-radius:8px;height:6px;overflow:hidden">
        <div style="height:100%;background:${col};width:${pctVal}%;border-radius:6px;transition:width 1s"></div>
      </div>
    </div>
    <div style="display:flex;gap:10px;flex-wrap:wrap;justify-content:center">
      <button onclick="toggleTimer()" id="timer-btn" style="padding:11px 28px;border-radius:12px;font-weight:700;font-size:15px;background:${state.timerRunning?"#7f1d1d":"#164e63"};border:2px solid ${state.timerRunning?"#ef4444":"#06b6d4"};color:${state.timerRunning?"#fca5a5":"#67e8f9"}">
        ${state.timerRunning?"⏸ Pause":"▶ Start"}
      </button>
      <button onclick="resetTimer()" style="padding:11px 18px;border-radius:12px;font-weight:600;font-size:14px;background:#1e293b;border:1px solid #334155;color:#64748b">↺ Reset</button>
      <button onclick="switchMode()" style="padding:11px 18px;border-radius:12px;font-weight:600;font-size:14px;background:#1e293b;border:1px solid #334155;color:#64748b">${mode==="study"?"☕ Pause-Modus":"⚡ Lern-Modus"}</button>
    </div>
    <div class="card" style="width:100%">
      <div style="font-size:11px;font-weight:700;color:#475569;letter-spacing:.1em;margin-bottom:10px">SCHNELL-TIMER</div>
      <div style="display:flex;gap:8px;flex-wrap:wrap">
        ${[["1,5h Zusammenfassung",5400],["1h Fragen üben",3600],["30min Wiederholung",1800],["15min Pause",900]].map(([l,s])=>
          `<button onclick="setTimer(${s})" style="padding:6px 12px;border-radius:8px;background:#1e293b;border:1px solid #334155;color:#94a3b8;font-size:12px">${l}</button>`
        ).join("")}
      </div>
    </div>
  </div>`;
}

function toggleTimer(){
if(!state.timerRunning){
state.timerRunning=true;
markToday();
timerInterval=setInterval(()=>{state.timerSec++;updateTimerDisplay();},1000);
}else{
state.timerRunning=false;
clearInterval(timerInterval);
}
renderMain();
}
function resetTimer(){clearInterval(timerInterval);state.timerSec=0;state.timerRunning=false;renderMain();}
function switchMode(){clearInterval(timerInterval);state.timerRunning=false;state.timerSec=0;state.timerMode=state.timerMode===“study”?“break”:“study”;renderMain();}
function setTimer(s){clearInterval(timerInterval);state.timerRunning=false;state.timerSec=s;renderMain();}
function updateTimerDisplay(){
const el=document.getElementById(“timer-display”);
if(el)el.textContent=fmt(state.timerSec);
}

Phase 2 (Mdl.): ${p2d}/${p2units.length} LE fertig

function copyExport(){
navigator.clipboard.writeText(window._exportText||””).then(()=>{
const btn=document.getElementById(“copy-btn”);
if(btn){btn.textContent=“✓ Kopiert!”;btn.style.background=”#064e3b”;btn.style.borderColor=”#10b981”;btn.style.color=”#34d399”;
setTimeout(()=>{btn.textContent=“📋 In Zwischenablage kopieren”;btn.style.background=”#164e63”;btn.style.borderColor=”#06b6d4”;btn.style.color=”#67e8f9”;},2000);}
});
}

// ─── ACTIONS ─────────────────────────────────────────────────────────────────
function selectUnit(id){
state.selId=id;
renderMain();
if(id){const el=document.getElementById(“detail-panel”);if(el)el.scrollIntoView({behavior:“smooth”,block:“start”});}
}

function setStatus(id,s){state.units[id].status=s;save();renderMain();}
function setScore(id,v){state.units[id].score=v;save();renderMain();}
function setField(id,f,v){state.units[id][f]=v;save();}

function addTag(id){
const inp=document.getElementById(“tag-input”);
if(!inp||!inp.value.trim())return;
state.units[id].tags=[…(state.units[id].tags||[]),inp.value.trim()];
save();renderMain();
}
function removeTag(id,i){
state.units[id].tags=state.units[id].tags.filter((_,j)=>j!==i);
save();renderMain();
}

function markToday(){
const t=new Date().toISOString().split(“T”)[0];
if(!state.dates.includes(t)){state.dates=[…state.dates,t];save();updateHeader();}
}
