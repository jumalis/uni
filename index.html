<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PsychSoz Quiz</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600&display=swap" rel="stylesheet">
<style>
:root{--bg:#F7F4EF;--bg2:#EEEAE1;--bg3:#E0DBD0;--ink:#1A1612;--ink2:#4A443C;--ink3:#7A7068;--acc:#2B4C8C;--acc2:#4A7AC8;--acc-bg:#EEF3FA;--grn:#2A6B3C;--grn-bg:#EAF4EE;--red:#8C2B2B;--red-bg:#F4EAEA;--gld:#B8860B;--gld-bg:#FDF6E3;--pur:#5B3A8C;--pur-bg:#F0EBF9;--r:12px;--sh:0 2px 16px rgba(26,22,18,.08)}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--ink);min-height:100vh;line-height:1.6}
.site-header{background:var(--ink);color:var(--bg);padding:.75rem 1.5rem;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;border-bottom:3px solid var(--acc2)}
.logo{font-family:'DM Serif Display',serif;font-size:1.3rem}.logo span{color:var(--acc2)}
.hdr-r{display:flex;align-items:center;gap:10px}
.hdr-meta{font-size:.78rem;color:#9A948C}
.theme-btn{background:none;border:1px solid #444;border-radius:6px;color:#ccc;padding:3px 10px;font-size:.75rem;cursor:pointer}
.main{max-width:760px;margin:0 auto;padding:1.5rem 1.25rem 4rem}
.hero{text-align:center;padding:2rem 1rem 1.5rem}
.hero h1{font-family:'DM Serif Display',serif;font-size:clamp(1.8rem,5vw,2.6rem);line-height:1.15;margin-bottom:.6rem}
.hero h1 em{color:var(--acc);font-style:italic}
.hero p{color:var(--ink2);font-size:.93rem;max-width:480px;margin:0 auto 1.5rem}
.pills{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;margin-bottom:1.5rem}
.pill{background:var(--bg2);border:1px solid var(--bg3);border-radius:100px;padding:4px 14px;font-size:.8rem;color:var(--ink2);font-weight:500}
.nav-tabs{display:flex;gap:5px;margin-bottom:1.5rem;background:var(--bg2);border-radius:var(--r);padding:4px}
.nav-tab{flex:1;padding:9px;border:none;border-radius:8px;background:transparent;color:var(--ink3);font-family:'DM Sans',sans-serif;font-size:.85rem;font-weight:500;cursor:pointer;transition:all .18s;text-align:center}
.nav-tab.active{background:white;color:var(--acc);box-shadow:0 1px 6px rgba(0,0,0,.1)}
.fl{font-size:.75rem;color:var(--ink3);text-align:center;margin-bottom:.6rem;font-weight:500;letter-spacing:.06em;text-transform:uppercase}
.yr-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(110px,1fr));gap:8px;margin-bottom:1.5rem}
.yr-card{background:var(--bg);border:1.5px solid var(--bg3);border-radius:var(--r);padding:.85rem;text-align:center;cursor:pointer;transition:all .18s}
.yr-card:hover{border-color:var(--acc2);background:var(--acc-bg);transform:translateY(-2px)}
.yr-card.sel{border-color:var(--acc);background:var(--acc-bg);box-shadow:0 0 0 2px var(--acc)}
.yn{font-family:'DM Serif Display',serif;font-size:1.5rem;color:var(--acc)}.yc{font-size:.7rem;color:var(--ink3);margin-top:2px}
.all-c{background:var(--ink);border-color:var(--ink)}.all-c:hover{background:var(--ink2)}.all-c.sel{background:var(--acc);border-color:var(--acc);box-shadow:0 0 0 2px var(--acc)}.all-c .yn,.all-c .yc{color:white}
.tp-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(138px,1fr));gap:8px;margin-bottom:1.5rem}
.tp-card{background:var(--bg);border:1.5px solid var(--bg3);border-radius:var(--r);padding:.8rem .7rem;text-align:center;cursor:pointer;transition:all .18s}
.tp-card:hover{border-color:var(--acc2);background:var(--acc-bg);transform:translateY(-2px)}
.tp-card.sel{border-color:var(--acc);background:var(--acc-bg);box-shadow:0 0 0 2px var(--acc)}
.all-tp{background:var(--ink);border-color:var(--ink)}.all-tp:hover{background:var(--ink2)}.all-tp.sel{background:var(--acc);border-color:var(--acc)}.all-tp .tcn,.all-tp .tcc,.all-tp .tci{color:white!important}
.tci{font-size:1.25rem;margin-bottom:3px}.tcnum{font-size:.6rem;color:var(--ink3);letter-spacing:.05em;margin-bottom:2px}.tcn{font-size:.74rem;font-weight:600;color:var(--ink);line-height:1.3;margin-bottom:2px}.tcc{font-size:.67rem;color:var(--ink3)}
.start-btn{display:block;width:100%;max-width:280px;margin:0 auto;padding:13px 24px;background:var(--acc);color:white;border:none;border-radius:var(--r);font-family:'DM Sans',sans-serif;font-size:1rem;font-weight:600;cursor:pointer;transition:all .18s;box-shadow:0 4px 16px rgba(43,76,140,.25)}
.start-btn:hover{background:#1E3A6E;transform:translateY(-1px)}
.prog-wrap{margin-bottom:1.25rem;animation:fu .3s ease both}
.prog-top{display:flex;justify-content:space-between;margin-bottom:6px}
.prog-lbl{font-size:.8rem;color:var(--ink3)}.prog-sc{font-size:.8rem;font-weight:600;color:var(--acc)}
.prog-track{height:5px;background:var(--bg2);border-radius:100px;overflow:hidden}
.prog-fill{height:100%;background:linear-gradient(90deg,var(--acc),var(--acc2));border-radius:100px;transition:width .4s ease}
.q-card{background:white;border:1px solid var(--bg3);border-radius:16px;padding:1.5rem;box-shadow:var(--sh);animation:fu .3s ease both;margin-bottom:1rem}
.q-badges{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:.8rem}
.badge{display:inline-flex;align-items:center;gap:4px;border-radius:100px;padding:3px 11px;font-size:.68rem;font-weight:600;letter-spacing:.04em;text-transform:uppercase;border:1px solid}
.b-yr{background:var(--gld-bg);color:var(--gld);border-color:#E8D280}
.b-tp{background:var(--acc-bg);color:var(--acc);border-color:#B8CCE8}
.q-num{font-size:.7rem;color:var(--ink3);margin-bottom:.4rem;letter-spacing:.06em;text-transform:uppercase}
.q-text{font-size:1rem;font-weight:500;color:var(--ink);line-height:1.55;margin-bottom:1rem}
.opts{display:flex;flex-direction:column;gap:7px}
.opt{display:flex;align-items:flex-start;gap:9px;padding:10px 12px;background:var(--bg);border:1.5px solid var(--bg3);border-radius:10px;cursor:pointer;text-align:left;font-family:'DM Sans',sans-serif;font-size:.87rem;color:var(--ink);line-height:1.5;transition:all .15s;width:100%}
.opt:hover:not(:disabled){border-color:var(--acc2);background:var(--acc-bg)}
.ol{flex-shrink:0;width:22px;height:22px;background:var(--bg2);border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:.7rem;font-weight:700;color:var(--ink3);transition:all .15s;margin-top:1px}
.opt:hover:not(:disabled) .ol{background:var(--acc2);color:white}
.opt.correct{background:var(--grn-bg);border-color:var(--grn);color:var(--grn)}.opt.correct .ol{background:var(--grn);color:white}
.opt.wrong{background:var(--red-bg);border-color:var(--red);color:var(--red)}.opt.wrong .ol{background:var(--red);color:white}
.opt:disabled{cursor:default}
.exp-box{margin-top:.9rem;padding:13px 15px;background:var(--bg);border-radius:10px;border-left:3px solid var(--acc);font-size:.86rem;color:var(--ink2);line-height:1.65;animation:fu .25s ease both}
.exp-head{font-weight:600;color:var(--acc);margin-bottom:5px;font-size:.76rem;text-transform:uppercase;letter-spacing:.05em}
.fc-box{margin-top:.7rem;padding:11px 13px;background:var(--pur-bg);border-radius:10px;border-left:3px solid var(--pur);font-size:.82rem;color:#3A2460;line-height:1.6;animation:fu .3s .1s ease both;opacity:0;animation-fill-mode:both}
.fc-head{font-size:.68rem;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--pur);margin-bottom:4px}
.fc-text{white-space:pre-line}
.btn-row{display:flex;gap:8px;margin-top:.9rem;flex-wrap:wrap}
.btn{padding:9px 18px;border-radius:10px;border:1.5px solid var(--bg3);background:var(--bg);color:var(--ink);font-family:'DM Sans',sans-serif;font-size:.87rem;font-weight:500;cursor:pointer;transition:all .15s}
.btn:hover{background:var(--bg2);border-color:var(--ink3)}
.btn-p{background:var(--acc);color:white;border-color:var(--acc)}.btn-p:hover{background:#1E3A6E}
/* FLASHCARD */
.fc-card{background:white;border:1px solid var(--bg3);border-radius:16px;padding:1.75rem;box-shadow:var(--sh);animation:fu .3s ease both;min-height:240px;display:flex;flex-direction:column}
.fc-q{font-size:1rem;font-weight:500;color:var(--ink);line-height:1.55;margin-bottom:1.25rem;flex:1}
.fc-show-btn{padding:11px;border-radius:10px;border:1.5px solid var(--acc);background:var(--acc-bg);color:var(--acc);font-family:'DM Sans',sans-serif;font-size:.9rem;font-weight:600;cursor:pointer;transition:all .2s;width:100%;text-align:center}
.fc-show-btn:hover{background:var(--acc);color:white}
.fc-ans{margin-top:.9rem;padding:13px;background:var(--grn-bg);border-radius:10px;border:1px solid #C0DDAA;animation:fu .2s ease both}
.fc-ans-lbl{font-size:.7rem;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--grn);margin-bottom:4px}
.fc-ans-txt{font-size:.88rem;color:#1A3C25;line-height:1.6;white-space:pre-line}
.fc-hint{font-size:.8rem;color:var(--ink3);margin-top:.7rem;white-space:pre-line;line-height:1.6}
.fc-rate{display:flex;gap:7px;margin-top:.9rem}
.fc-r{flex:1;padding:9px;border-radius:10px;border:1.5px solid;font-family:'DM Sans',sans-serif;font-size:.83rem;font-weight:600;cursor:pointer;transition:all .18s;text-align:center}
.fc-hard{border-color:var(--red);color:var(--red);background:var(--red-bg)}.fc-hard:hover{background:var(--red);color:white}
.fc-ok{border-color:var(--gld);color:var(--gld);background:var(--gld-bg)}.fc-ok:hover{background:var(--gld);color:white}
.fc-easy{border-color:var(--grn);color:var(--grn);background:var(--grn-bg)}.fc-easy:hover{background:var(--grn);color:white}
/* SUMMARY */
.sum-hero{text-align:center;padding:2rem;background:white;border:1px solid var(--bg3);border-radius:16px;margin-bottom:1.25rem;box-shadow:var(--sh);animation:fu .4s ease both}
.big-sc{font-family:'DM Serif Display',serif;font-size:4rem;color:var(--acc);line-height:1;margin-bottom:.2rem}
.sc-sub{font-size:.93rem;color:var(--ink3)}
.grade{display:inline-block;margin-top:.7rem;padding:5px 16px;border-radius:100px;font-size:.8rem;font-weight:600}
.ga{background:var(--grn-bg);color:var(--grn)}.gb{background:var(--gld-bg);color:var(--gld)}.gc{background:var(--red-bg);color:var(--red)}
.tp-stats{display:grid;grid-template-columns:repeat(auto-fill,minmax(190px,1fr));gap:8px;margin-bottom:1.25rem}
.ts{background:white;border:1px solid var(--bg3);border-radius:10px;padding:.8rem 1rem}
.ts-name{font-size:.78rem;font-weight:600;color:var(--ink);margin-bottom:4px}
.ts-bg{height:5px;background:var(--bg2);border-radius:100px;overflow:hidden;margin-bottom:3px}
.ts-fill{height:100%;border-radius:100px}
.ts-lbl{font-size:.68rem;color:var(--ink3)}
.rev-hd{font-family:'DM Serif Display',serif;font-size:1.2rem;color:var(--ink);margin-bottom:.8rem;animation:fu .3s .1s ease both;opacity:0;animation-fill-mode:both}
.rev-item{background:white;border:1px solid var(--bg3);border-radius:10px;padding:.85rem 1rem;margin-bottom:6px;border-left:4px solid var(--bg3)}
.rev-item.ok{border-left-color:var(--grn)}.rev-item.fail{border-left-color:var(--red)}
.ri-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:4px}
.ri-meta{font-size:.7rem;color:var(--ink3)}.ri-st{font-size:.7rem;font-weight:600}
.ri-st.ok{color:var(--grn)}.ri-st.fail{color:var(--red)}
.ri-q{font-size:.87rem;font-weight:500;margin-bottom:4px;line-height:1.4}
.ri-ans{font-size:.79rem;line-height:1.4}
.ri-wr{color:var(--red)}.ri-rt{color:var(--grn)}
/* STATS SCREEN */
.st-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:10px;margin-bottom:1.25rem}
.met{background:white;border:1px solid var(--bg3);border-radius:var(--r);padding:.9rem;box-shadow:var(--sh)}
.met-v{font-family:'DM Serif Display',serif;font-size:1.9rem;color:var(--acc);line-height:1}
.met-l{font-size:.76rem;color:var(--ink3);margin-top:2px}
.tp-prog{display:flex;flex-direction:column;gap:7px}
.tp-row{background:white;border:1px solid var(--bg3);border-radius:10px;padding:.8rem 1rem}
.tp-hd{display:flex;justify-content:space-between;align-items:center;margin-bottom:5px}
.tp-nm{font-size:.83rem;font-weight:500;color:var(--ink)}.tp-pct{font-size:.78rem;font-weight:600;color:var(--acc)}
.tp-bg{height:5px;background:var(--bg2);border-radius:100px;overflow:hidden}
.tp-fill{height:100%;background:linear-gradient(90deg,var(--acc),var(--acc2));border-radius:100px;transition:width .6s ease}
.tp-sub{font-size:.68rem;color:var(--ink3);margin-top:3px}
/* mode switch */
.mode-sw{display:flex;background:var(--bg2);border-radius:var(--r);padding:4px;gap:4px;margin-bottom:1.5rem}
.mode-btn{flex:1;padding:9px;border:none;border-radius:8px;background:transparent;color:var(--ink2);font-family:'DM Sans',sans-serif;font-size:.87rem;font-weight:500;cursor:pointer;transition:all .18s}
.mode-btn.active{background:white;color:var(--acc);box-shadow:0 1px 4px rgba(0,0,0,.1)}
@keyframes fu{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
/* DARK */
body.dark{--bg:#1A1814;--bg2:#242018;--bg3:#302C24;--ink:#F0EBE2;--ink2:#C4BDB5;--ink3:#847D75;--acc:#6A9AE8;--acc2:#89B4F0;--acc-bg:#1A2540;--grn:#5CAF7A;--grn-bg:#1A3026;--red:#E87878;--red-bg:#3A1A1A;--gld:#D4A832;--gld-bg:#2A2010;--pur:#A88CE8;--pur-bg:#241840;--sh:0 2px 16px rgba(0,0,0,.4)}
body.dark .q-card,body.dark .fc-card,body.dark .sum-hero,body.dark .met,body.dark .tp-row,body.dark .ts,body.dark .rev-item{background:#242018;border-color:var(--bg3)}
body.dark .site-header{background:#0E0C0A}
body.dark .opt{background:var(--bg2);border-color:var(--bg3)}
body.dark .exp-box{background:var(--bg2)}
@media(max-width:500px){.main{padding:1rem .85rem 3rem}.q-card,.fc-card{padding:1.1rem}.hero h1{font-size:1.65rem}.tp-grid{grid-template-columns:repeat(2,1fr)}}
</style>
</head>
<body>
<header class="site-header">
  <div class="logo">Psych<span>Soz</span></div>
  <div class="hdr-r">
    <span class="hdr-meta" id="hdrMeta">Klausurtraining</span>
    <button class="theme-btn" onclick="toggleDark()" id="themeBtn">🌙 Dark</button>
  </div>
</header>
<main class="main" id="app"></main>
<script>
const ALL_Q=[
{year:"2021",q:"Was trifft auf die Deprivationsthese nach Wilkinson zu?",opts:["Leistung in Sektoren wird gesteigert","Werte und Normen nehmen mit Einkommensungleichheit zu","Nicht die reichsten Bevölkerungen sind am gesündesten, sondern die mit dem kleinsten Sozialgradienten zwischen arm und reich","Sozialgradient wird nicht berücksichtigt"],ans:2,topic:6,exp:"Die Deprivationsthese nach Wilkinson besagt, dass nicht die reichsten Länder die gesündesten sind, sondern jene mit den geringsten Einkommensunterschieden (kleinstem Sozialgradienten). Gesellschaften mit großer Ungleichheit zeigen schlechtere Gesundheitsindikatoren, weil das Gefühl der relativen Benachteiligung selbst krankmacht – psychosozialer Stress entsteht durch Statusvergleiche.",fc:"Soz. Ungleichheit: Sozialgradient, meritokr. Triade, Wilkinson-Deprivation"},
{year:"2021",q:"Welcher Test wird verwendet, um MCI (Mild Cognitive Impairment) zu diagnostizieren?",opts:["MoCA (Montreal Cognitive Assessment)","Uhrentest","MMST (Mini-Mental-Status-Test)","Barthel-Index","DemTec"],ans:0,topic:1,exp:"Der MoCA-Test ist das geeignetste Instrument zur Diagnostik von MCI, da er sensitiver ist als der MMST. Er prüft Gedächtnis, Sprache, Aufmerksamkeit, Exekutivfunktionen und visuell-räumliche Fähigkeiten. Der MMST ist zwar bekannter, erkennt MCI aber schlechter – er ist eher für manifeste Demenz geeignet. Der Barthel-Index misst Alltagsfunktionen, nicht Kognition.",fc:"Gesundheit & Krankheit: WHO-Definition, Klassifikationssysteme, Diagnose"},
{year:"2021",q:"Was trifft auf den Begriff Assimilation (nach Piaget) zu?",opts:["Positive Verstärkung von der Mutter","Kind ordnet neue Erfahrungen in bestehende kognitive Schemata ein","Kognitives Schema wird um neue Informationen erweitert","Kind passt die Denkweise an die neue Umgebung an","Neue Objekte werden in bereits bestehendes kognitives Schema integriert (ohne Erweiterung)"],ans:4,topic:12,exp:"Assimilation (nach Piaget) bedeutet, dass neue Erlebnisse in bereits vorhandene kognitive Schemata eingeordnet werden – ohne diese zu verändern. Ein Kind sieht einen Hund und nennt ihn 'Wauau', weil das zu seinem Schema passt. Abzugrenzen ist die Akkommodation: dort wird das Schema selbst erweitert oder verändert. Die korrekte Option legt fest, dass keine Erweiterung stattfindet, was Assimilation von Akkommodation abgrenzt.",fc:"Entwicklungspsychologie: Piaget, Erziehungsstile, Pubertät, ToM, Armut"},
{year:"2021",q:"Welcher Erziehungsstil ist laut Studien am besten geeignet, chronisch kranke Kinder großzuziehen?",opts:["Autoritärer Stil","Permissiver Stil","Laissez-faire Stil","Autoritativer Stil","Kognitiver Stil"],ans:3,topic:12,exp:"Der autoritative (demokratische) Erziehungsstil gilt als der günstigste für die Entwicklung – besonders bei chronisch kranken Kindern. Er kombiniert hohe Wärme und Unterstützung mit klaren, konsistenten Grenzen und Regeln. Im Gegensatz zum autoritären Stil (streng, wenig Wärme) oder permissiven Stil (viel Wärme, kaum Grenzen) fördert der autoritative Stil Selbstwirksamkeit, Resilienz und Therapieadhärenz.",fc:"Entwicklungspsychologie: Piaget, Erziehungsstile, Pubertät, ToM, Armut"},
{year:"2021",q:"Anhand welcher Norm wird Körpergewicht zur Beurteilung von Adipositas bei Kindern gemessen?",opts:["Funktionelle Norm","Physiologischer Sollwert","Statistische Norm","Biopsychosoziale Norm"],ans:2,topic:1,exp:"Bei Kindern wird Adipositas anhand der statistischen Norm beurteilt – mithilfe von Perzentilenkurven (z.B. der Kromeyer-Hauschild-Kurven). Kinder gelten ab der 97. Perzentile als adipös und zwischen 90.–97. als übergewichtig. Dies ist ein statistischer Vergleich mit der Referenzpopulation. Beim Erwachsenen nutzt man eher den BMI, der eher einer funktionellen Norm entspricht.",fc:"Gesundheit & Krankheit: WHO-Definition, Klassifikationssysteme, Diagnose"},
{year:"2021",q:"Eine Altenpflegerin (52 J.) arbeitet seit 10 Jahren in einem Demenz-Pflegeheim und entwickelt ein Burnout-Syndrom. Woher könnte das kommen?",opts:["Zunehmende Diskrepanz zwischen Leistungsfähigkeit und Anforderungen","Fehlende positive Anerkennung","Langeweile wegen fehlender Abwechslung","Emotionale Belastung und unerfüllbar hoher Anspruch an die eigene Arbeit","Fehlende Möglichkeit, Arbeitsprozesse selbst zu gestalten"],ans:3,topic:10,exp:"Burnout in der Pflege entsteht häufig durch das Zusammenspiel von hoher emotionaler Belastung und perfektionistischen Ansprüchen an die eigene Arbeit. Gerade in der Demenzpflege ist man täglich mit Leid konfrontiert und kann trotz großem Einsatz nur begrenzt helfen – diese Diskrepanz zwischen Anspruch und tatsächlicher Leistungsmöglichkeit ist ein zentraler Burnout-Faktor.",fc:"Stress: Lazarus (primar/sekundäre Bewertung), AAS (Selye), Karasek, Siegrist"},
{year:"2021",q:"Was würden Sie einem übergewichtigen Patienten mit DMT2 zur Gewichtsreduktion NICHT empfehlen (was steht nicht in den Adipositas-Leitlinien)?",opts:["Nahezu völlig kohlenhydratfreie Ernährung","Zusätzlicher Energieverbrauch von 1200–1800 kcal/Woche","Selbstbeobachtung bezüglich Essverhalten","Aufbau sozialen Rückhalts","Kontrolle der Mahlzeiten über Protokolle/Tagebücher"],ans:0,topic:13,exp:"Die S3-Leitlinie Adipositas empfiehlt keine extrem kohlenhydratarme (ketogene) Diät als Standardmaßnahme. Zwar kann ein moderates Kaloriendefizit mit verschiedenen Zusammensetzungen erreicht werden, aber eine nahezu vollständige Kohlenhydratelimination ist nicht Teil der offiziellen Leitlinienempfehlung. Empfohlen sind hingegen: erhöhter Energieverbrauch, Selbstmonitoring, soziale Unterstützung und Tagebücher.",fc:"Prävention: Primär/Sekundär/Tertiär, Ottawa-Charta, Präventionsparadox"},
{year:"2021",q:"Frage zur palliativen Versorgung – Falschaussage gesucht:",opts:["Nach ambulanter Versorgung ist auch eine Versorgung im Hospiz möglich","Der Patient hat die Wahl zwischen ambulanter und stationärer Versorgung","Die Familie muss 10% der Kosten der ambulanten Versorgung selbst tragen","Das ambulante Team arbeitet 24h/7 Tage und kann starke Schmerzmedikamente verabreichen","Der Patient hat das Recht auf ambulante oder stationäre Palliativversorgung"],ans:2,topic:11,exp:"Die SAPV (Spezialisierte Ambulante Palliativversorgung) ist eine GKV-Leistung – Patienten müssen keine Eigenanteile von 10% tragen. Sie ist vollständig durch die Krankenkasse finanziert. Das SAPV-Team ist tatsächlich rund um die Uhr erreichbar und kann hochpotente Schmerztherapie verabreichen.",fc:"Gesundheitssystem: GKV/PKV, G-BA, KBV, Sach-/Kostenerstattung, SAPV"},
{year:"2021",q:"Herr K. hat Angst, die Erkrankungen seines Vaters zu bekommen. Was würden Sie zur Gesundheitsförderung empfehlen?",opts:["Aufgabe des Rauchens und Vermindern des Alkoholkonsums","Förderung der Gesundheitskompetenz und des Selbstvertrauens","Erstellung eines festen Sportplans","Regelmäßige Kontrolle des Blutdrucks","Cholesterinreduzierende Diät"],ans:1,topic:13,exp:"Gesundheitsförderung nach Ottawa-Charta zielt auf Empowerment – also die Stärkung von Handlungskompetenz und Selbstwirksamkeit. Nicht Risikofaktoren bekämpfen (das wäre Prävention), sondern Ressourcen stärken. Die Förderung von Gesundheitskompetenz (Health Literacy) und Selbstvertrauen befähigt Herrn K., eigenverantwortlich gesundheitsförderliche Entscheidungen zu treffen.",fc:"Prävention: Primär/Sekundär/Tertiär, Ottawa-Charta, Präventionsparadox"},
{year:"2021",q:"Eine Doktorantin hat die Versuchsbeschreibung für psychometrische Tests weggelassen. Was ist dadurch am stärksten beeinträchtigt?",opts:["Konstruktvalidität","Objektivität","Inhaltsvalidität","Retest-Reliabilität","Ökonomie"],ans:3,topic:2,exp:"Durch das Weglassen standardisierter Versuchsanweisungen ist vor allem die Retest-Reliabilität beeinträchtigt: Wenn Instruktionen nicht einheitlich sind, variieren die Ergebnisse beim Wiederholen des Tests. Anmerkung: Die Objektivität (Durchführungsobjektivität) könnte auch betroffen sein – die Frage ist anfechtbar.",fc:"Methoden: Gütekriterien, Statistik (α/β-Fehler, OR, HR, r), Studiendesign"},
{year:"2021",q:"Welche Hypothese wird in der medizinischen Forschung eher nicht aufgestellt?",opts:["Deterministische Hypothese","Nullhypothese","Alternativhypothese","Forschungshypothese","Probabilistische Hypothese"],ans:0,topic:2,exp:"In der medizinischen Forschung werden keine deterministischen Hypothesen aufgestellt, da biologische Systeme von Natur aus variabel und komplex sind. Medizinische Hypothesen sind immer probabilistisch ('X erhöht das Risiko von Y'). Deterministische Aussagen ('Wenn X, dann immer Y') gibt es in der Physik, aber nicht in der Medizin, wo immer Ausnahmen und Confounding-Faktoren existieren.",fc:"Methoden: Gütekriterien, Statistik (α/β-Fehler, OR, HR, r), Studiendesign"},
{year:"2021",q:"Was gibt die Effektstärke wieder?",opts:["Cohens d (standardisierte Mittelwertdifferenz)","Hazard Ratio","Relatives Risiko (RR)","Signifikanzniveau Alpha","Cronbachs Alpha"],ans:0,topic:2,exp:"Die Effektstärke (z.B. Cohens d) misst die praktische Bedeutsamkeit eines Befundes – unabhängig vom Stichprobenumfang. Cohens d setzt die Mittelwertdifferenz zweier Gruppen ins Verhältnis zur gepoolten Standardabweichung. Konventionen: d=0,2 = klein, d=0,5 = mittel, d=0,8 = groß. Das Signifikanzniveau sagt nichts über die Größe des Effekts aus.",fc:"Methoden: Gütekriterien, Statistik (α/β-Fehler, OR, HR, r), Studiendesign"},
{year:"2021",q:"Was stimmt NICHT in Bezug auf die demographische Entwicklung in Deutschland?",opts:["Die Verzahnung von stationärer und ambulanter Versorgung nimmt ab","Der demographische Wandel entsteht durch Geburtenrate, Sterberate und Wanderungssaldo","Der demographische Wandel hängt mit strukturellen Bedingungen zusammen","Bedeutet in Deutschland zunehmend ältere Bevölkerung","Bedeutet allgemein Änderung der Bevölkerungsstruktur"],ans:0,topic:4,exp:"Die Falschaussage ist A: Die Verzahnung von stationärer und ambulanter Versorgung nimmt tatsächlich ZU, nicht ab. Integrierte Versorgungsformen und sektorenübergreifende Zusammenarbeit werden politisch und gesundheitlich gefördert. Die anderen Aussagen beschreiben den demographischen Wandel korrekt.",fc:"Demografie: Lebenserwartung, Altenquotient, Geburtenrate, Wanderungssaldo"},
{year:"2021",q:"Welcher r-Wert beschreibt eine negative, mittelstarke Datenwolke am ehesten?",opts:["-1,2","-0,7","0,8","0,2","0,4"],ans:1,topic:2,exp:"Ein r-Wert von -0,7 beschreibt eine negative, mittelstarke bis starke Korrelation. r liegt immer zwischen -1 und +1 (daher ist -1,2 mathematisch unmöglich). Bei einer Datenwolke, die eine deutlich negative Tendenz zeigt, wäre -0,7 plausibel. r = +0,8 wäre eine starke positive Korrelation.",fc:"Methoden: Gütekriterien, Statistik (α/β-Fehler, OR, HR, r), Studiendesign"},
{year:"2021",q:"Was stimmt zum Präventionsparadox?",opts:["Wenn der Gesundheitsminister zur COVID-Impfung aufruft, um Herdenimmunität zu erreichen","Wenn in einer Praxis ein Raum mit Blei für den Strahlenschutz ausgekleidet wird","Schnelltest für alle am Eingang","Eine KK lädt übergewichtige Personen zu Bewegungsprogrammen ein","Diabetiker Typ 2 werden zu einer Schulung geschickt"],ans:0,topic:13,exp:"Das Präventionsparadox (Geoffrey Rose) besagt: Maßnahmen, die der Gesamtbevölkerung nutzen, bringen dem Einzelnen kaum erkennbaren Nutzen. Die COVID-Impfung zur Herdenimmunität ist das Paradebeispiel: Ein Geimpfter schützt sich selbst kaum mehr, aber die Gemeinschaft profitiert enorm. Antwort D (Hochrisikogruppe) wäre eher Hochrisikoprävention.",fc:"Prävention: Primär/Sekundär/Tertiär, Ottawa-Charta, Präventionsparadox"},
{year:"2021",q:"Ein Glücksspieler spielt weiter, weil er andere im Kasino gewinnen sieht. Welche Urteilsheuristik liegt vor?",opts:["Verfügbarkeitsheuristik","Framing-Heuristik","Repräsentativitätsheuristik","Ankerheuristik","Rekognitionsheuristik"],ans:0,topic:8,exp:"Die Verfügbarkeitsheuristik besagt: Wir beurteilen die Wahrscheinlichkeit von Ereignissen danach, wie leicht uns Beispiele dazu einfallen. Gewinne im Kasino sind sichtbar und einprägsam, Verluste werden übersehen. Deshalb überschätzt der Spieler die Gewinnchancen.",fc:"Motivation: Selbstwirksamkeit (Bandura), Health-Belief-Modell, Heuristiken"},
{year:"2021",q:"Die Nullhypothese bleibt bestehen, es besteht jedoch ein echter Effekt. Was trifft zu?",opts:["Beta-Fehler (Typ-II-Fehler)","Alpha-Fehler (Typ-I-Fehler)","Gamma-Fehler","Irgendwas-Diskrepanz"],ans:0,topic:2,exp:"Der Beta-Fehler (Typ-II-Fehler) liegt vor, wenn die H0 beibehalten wird, obwohl in Wirklichkeit ein Effekt existiert (H1 wahr ist). Man 'übersieht' also einen echten Effekt. Der Alpha-Fehler (Typ-I-Fehler) ist der umgekehrte Fall: H0 wird abgelehnt, obwohl kein Effekt existiert.",fc:"Methoden: Gütekriterien, Statistik (α/β-Fehler, OR, HR, r), Studiendesign"},
{year:"2021",q:"Welche Prävention ist am effektivsten, um Karies bei Kindern vorzubeugen?",opts:["Fluoridierung des Trinkwassers","Regelmäßige Kontrolluntersuchungen einmal im Jahr","Plakate in Einkaufszentren zur Mundhygiene","Verstärkte Aufklärung in Schulen","Vorführung von Maßnahmen"],ans:0,topic:13,exp:"Die Trinkwasserfluoridierung ist eine der effektivsten bevölkerungsweiten Maßnahmen gegen Karies – klassisches Beispiel für universelle Prävention (Präventionsparadox nach Rose). Alle profitieren, auch wenn der individuelle Effekt klein erscheint.",fc:"Prävention: Primär/Sekundär/Tertiär, Ottawa-Charta, Präventionsparadox"},
{year:"2021",q:"Was spielt bei der Handlungskontrolle des HAPA-Modells eine wichtige Rolle?",opts:["Selbstwirksamkeitserwartung bzgl. Wiederaufnahme nach Rückfall","Selbstbeobachtung","Intention","Bewältigungshandlung","Handlungs-Ergebnis-Erwartung"],ans:1,topic:14,exp:"In der Handlungskontrolle (volitionale Phase) des HAPA-Modells spielt die Selbstbeobachtung eine zentrale Rolle: Man beobachtet das eigene Verhalten, vergleicht es mit der Intention und reguliert entsprechend. Anmerkung: Die Frage ist anfechtbar, da auch Selbstwirksamkeit bzgl. Rückfall zur Handlungskontrolle gehört.",fc:"Adhärenz: HAPA-Modell (Schwarzer), SMART, Change-Talk, Motivierende GF"},
{year:"2021",q:"Welche Aussage bezüglich der Abnahme der kognitiven Leistungsfähigkeit im Alter stimmt?",opts:["Zwischen 20. und 60. Lj. gibt es keine Abnahme","Im 30. Lj. nimmt numerisches Verständnis ab","Um das 60. Lj.: Abnahme bei räumlicher Orientierung, Rechenfähigkeiten und Wahrnehmungsgeschwindigkeit","Ab dem 60. Lj.: Abnahme bei verbalen Fähigkeiten und dem verbalen Gedächtnis"],ans:2,topic:12,exp:"Um das 60. Lebensjahr nehmen fluide Fähigkeiten ab: räumliche Orientierung, Wahrnehmungsgeschwindigkeit und Rechenfertigkeiten. Verbale Fähigkeiten und das verbale Gedächtnis (kristalline Intelligenz) bleiben hingegen lange stabil – oft bis ins hohe Alter.",fc:"Entwicklungspsychologie: Piaget, Erziehungsstile, Pubertät, ToM, Armut"},
{year:"2021",q:"Odds-Ratio = 2,7. Welche Aussage stimmt NICHT?",opts:["Die Referenzgruppe wurde auf 0 normiert","Risiko um 170% erhöht","Risiko 2,7-fach höher","Referenzgruppe ist prävalent für die Erkrankung","Bei 95%-KI von 2,5–2,9 ist das Ergebnis statistisch signifikant"],ans:0,topic:2,exp:"Die Referenzgruppe wird beim Odds-Ratio auf 1 normiert, nicht auf 0. Das OR der Referenzgruppe beträgt immer 1. Ein OR von 2,7 bedeutet: die Chance der Expositionsgruppe ist 2,7-mal so hoch. Die Risikosteigerung: (2,7-1)×100% = 170%.",fc:"Methoden: Gütekriterien, Statistik (α/β-Fehler, OR, HR, r), Studiendesign"},
{year:"2021",q:"Richtigaussage zur sekundären Sozialisation:",opts:["Kind im Vorschulalter, das seine Umwelt erlebt","Durch Bezugspersonen in Schule/Kindergarten außerhalb der Familie","Geschwister","Familie"],ans:1,topic:9,exp:"Sekundäre Sozialisation findet außerhalb der Familie statt – in Kindergarten, Schule, Peergruppen und anderen Institutionen. Hier erlernt das Kind gesellschaftliche Normen und soziale Fähigkeiten jenseits des familiären Rahmens. Primäre Sozialisation findet in der Familie statt.",fc:"Sozialisation: Primär/Sekundär, Hurrelmann, Erikson-Phasen, Krappmann"},
{year:"2021",q:"Welche Aussage stimmt zur Entwicklung des Gehirns in der Pubertät?",opts:["Die Neuronendichte nimmt ab; Synapsen die nicht genutzt werden, werden abgebaut","Steigende Stressresistenz im Vergleich zu Kleinkindern","Besserer Umgang mit Therapien als Kinder","Die Myelinisierung der wichtigsten Assoziationsfasern ist beendet","Jugendliche kommen besser klar mit strengen Diäten"],ans:0,topic:12,exp:"In der Pubertät findet sog. Synaptic Pruning statt: Neuronale Verbindungen, die nicht genutzt werden, werden abgebaut ('use it or lose it'). Jugendliche sind NICHT stressresistenter – das limbische System ist überaktiv, während der präfrontale Kortex noch reift.",fc:"Entwicklungspsychologie: Piaget, Erziehungsstile, Pubertät, ToM, Armut"},
{year:"2021",q:"Welche Ressource trägt eher NICHT zur Resilienz bei?",opts:["Sozialer Rückhalt","Selbstwirksamkeitserwartung","Emotionale Stabilität","Dispositionaler Optimismus","Individuelle Reaktanz"],ans:4,topic:15,exp:"Resilienz wird durch sozialen Rückhalt, Selbstwirksamkeit, emotionale Stabilität und Optimismus gefördert. Reaktanz (Widerstand gegen wahrgenommene Freiheitseinschränkungen) ist kein etablierter Resilienzfaktor und kann sogar kontraproduktiv sein, wenn man Hilfsangebote ablehnt.",fc:"Krankheitsbewältigung: Fennell-Phasen, Resilienz, Psychoonkologie, HRQoL"},
{year:"2021",q:"Welche Aussage zu Demenzerkrankungen trifft NICHT zu?",opts:["Die Zahl der Frauen über 65 mit Demenz ist nur geringfügig höher als die der Männer","Bei stationär behandelten Über-65-Jährigen haben 20% eine Demenz","Demenz ist ein Syndrom","Pflegekassen stufen den Pflegegrad ein"],ans:3,topic:1,exp:"Den Pflegegrad stuft nicht die Pflegekasse selbst ein, sondern der MDK (Medizinischer Dienst der Krankenversicherung) im Auftrag der Pflegekasse. Die Pflegekasse ist Kostenträger, der MDK das Begutachtungsorgan.",fc:"Gesundheit & Krankheit: WHO-Definition, Klassifikationssysteme, Diagnose"},
{year:"2021",q:"Was ist KEINE Grundlage zur Aufrechterhaltung der geistigen Leistungsfähigkeit?",opts:["Angeborene Intelligenz","Unterhaltsame Freizeitaktivitäten (ohne soziale Komponente)","Sport","Kognitives Training","(Schul-)Bildung"],ans:1,topic:1,exp:"Rein passive, unterhaltsame Freizeitaktivitäten (z.B. passives Fernsehen) sind keine nachgewiesene Grundlage zur Aufrechterhaltung der kognitiven Leistungsfähigkeit. Nachgewiesene protektive Faktoren: Sport, kognitives Training, Bildung und soziale Teilhabe.",fc:"Gesundheit & Krankheit: WHO-Definition, Klassifikationssysteme, Diagnose"},
{year:"2021",q:"Richtigaussage zu Krankenkassen:",opts:["Beiträge nehmen mit dem Alter zu bei GKV","Durch zunehmend ältere Gesellschaft besteht Gefahr einer GKV-Unterfinanzierung","Ein GKV-Versicherter ist verpflichtet, seine Arztrechnungen zu überprüfen"],ans:1,topic:11,exp:"Die GKV basiert auf dem Solidarprinzip – ältere, chronisch kranke Versicherte zahlen nicht mehr als gesunde. Mit der Alterung der Gesellschaft steigen die Gesundheitsausgaben, während die Einzahlenden proportional weniger werden. Dies gefährdet mittelfristig die Finanzierbarkeit.",fc:"Gesundheitssystem: GKV/PKV, G-BA, KBV, Sach-/Kostenerstattung, SAPV"},
{year:"2021",q:"Falschaussage zu Krankenkassen:",opts:["Die GKV hat die Aufgabe, die ambulante Versorgung aufrechtzuerhalten","GKV nach Kostenerstattungsprinzip","Privatversicherte haben Anspruch auf alle medizinisch notwendigen Leistungen","Kinder und Ehepartner sind bei der GKV kostenlos mitversichert"],ans:1,topic:11,exp:"Die GKV arbeitet nach dem Sachleistungsprinzip, NICHT nach dem Kostenerstattungsprinzip. GKV-Versicherte erhalten Leistungen direkt. Das Kostenerstattungsprinzip gilt für die PKV: dort zahlt der Patient zunächst selbst und bekommt dann erstattet.",fc:"Gesundheitssystem: GKV/PKV, G-BA, KBV, Sach-/Kostenerstattung, SAPV"},
{year:"2021",q:"Was trifft NICHT zu auf ICD-10 Hyperkinetische Störung (ADHS)?",opts:["Maximal 10% aller Betroffenen brauchen nach der Pubertät eine weitere Therapie","Fehlende Inhibition kann genetisch bedingt sein","Bei Mädchen seltener als bei Jungs","Betroffene werden später eher Nikotin-abhängig","Schwere der Störung auch durch soziale Strukturen bestimmt"],ans:0,topic:1,exp:"Die Aussage ist falsch – es sind tatsächlich viel mehr als 10%. Studien zeigen, dass bei ca. 40–80% der Betroffenen ADHS-Symptome ins Erwachsenenalter fortbestehen. Die anderen Aussagen sind korrekt: genetische Komponente, Geschlechtsunterschied (♂:♀ = 3:1) und erhöhtes Suchtrisiko sind belegt.",fc:"Gesundheit & Krankheit: WHO-Definition, Klassifikationssysteme, Diagnose"},
{year:"2021",q:"Am Ende des Arzt-Patienten-Gespräches wird die Therapie nochmals wiederholt. Welcher Effekt liegt dem zugrunde?",opts:["Recency-Effekt","Prozedurales Gedächtnis","Phonologische Schleife","Visuell-räumliches Notizbuch","Enkodierungsspezifität"],ans:0,topic:5,exp:"Der Recency-Effekt besagt: Das zuletzt Genannte wird am besten erinnert. Durch Wiederholung am Ende des Gesprächs nutzt der Arzt diesen Effekt gezielt. In der Arzt-Patienten-Kommunikation wird dies als 'Zusammenfassung am Schluss' empfohlen.",fc:"Gedächtnis: Episodisch, Semantisch, Prozedural, Priming, Amnesieformen"},
{year:"2021",q:"Frage zur Angststörung – Richtigaussage:",opts:["Angstzustände werden durch Vermeidung, negative Verstärkung und kognitive Dysfunktion aufrechterhalten","Generalisierte Angststörungen sind die häufigsten psychischen Störungen bei Frauen","Männer häufiger betroffen als Frauen","Therapieoptionen der ersten Wahl sind Verhaltenstherapie"],ans:0,topic:1,exp:"Angststörungen werden durch einen Teufelskreis aufrechterhalten: Vermeidungsverhalten verhindert Habituation (negative Verstärkung), dysfunktionale Kognitionen erhalten die Störung aufrecht. Dies ist die Grundlage kognitiv-verhaltenstherapeutischer Interventionen (Exposition).",fc:"Gesundheit & Krankheit: WHO-Definition, Klassifikationssysteme, Diagnose"},
{year:"2021",q:"Transaktionales Stressmodell nach Lazarus – was trifft zu?",opts:["Psychische und physiologische Stressoren werden unterschieden","Sekundäre Bewertung der eigenen Ressourcen/Leistungsfähigkeit"],ans:1,topic:10,exp:"Im transaktionalen Stressmodell nach Lazarus gibt es primäre Bewertung (ist die Situation bedrohlich?) und sekundäre Bewertung (welche Ressourcen habe ich?). Die sekundäre Bewertung der eigenen Ressourcen und Bewältigungsmöglichkeiten ist entscheidend dafür, ob Stress erlebt wird.",fc:"Stress: Lazarus (primar/sekundäre Bewertung), AAS (Selye), Karasek, Siegrist"},
{year:"2021",q:"Neugeborene Jungen 2017–2019, Lebenserwartung 78 Jahre. Welche Aussage stimmt?",opts:["Bezeichnet die Lebenserwartung von Jungen unter den Umständen von 2017–2019","Jungen, die in dem Zeitraum geboren wurden, erreichen durchschnittlich ein Sterbealter von 78,6 Jahren","Die Corona-Pandemie beeinflusst diesen Wert nicht","Berücksichtigt zukünftige Sterberaten","Setzt sich zusammen aus Geburtsrate, Sterberate und Migrationsrate"],ans:0,topic:4,exp:"Die Lebenserwartung bei Geburt ist eine hypothetische Kennzahl: Sie beschreibt, wie alt ein heute geborenes Kind werden würde, wenn die aktuellen Sterblichkeitsverhältnisse zeitlebens konstant blieben. Sie basiert auf Periodensterbetafeln und berücksichtigt keine zukünftigen Entwicklungen.",fc:"Demografie: Lebenserwartung, Altenquotient, Geburtenrate, Wanderungssaldo"},
{year:"2021",q:"WHO unterteilt Faktoren bei Adhärenz in 5 Gruppen. Welche gehört NICHT dazu?",opts:["Krankheitsspezifische Faktoren","Biogenetische Faktoren","Anforderungen der Therapie","Sozioökonomische Faktoren","Patientenbezogene Faktoren"],ans:1,topic:14,exp:"Das WHO-Adhärenzmodell (2003) unterteilt in 5 Dimensionen: sozioökonomische, gesundheitssystembezogene, therapiebezogene, krankheitsbezogene und patientenbezogene Faktoren. 'Biogenetische Faktoren' ist KEINE eigenständige WHO-Kategorie.",fc:"Adhärenz: HAPA-Modell (Schwarzer), SMART, Change-Talk, Motivierende GF"},
{year:"2021",q:"Hazard-Ratio = 1,4 (Diabetes vs. Nicht-Diabetes, schwerer COVID-Verlauf). Falschaussage:",opts:["Risiko für Diabetiker ist um 140% erhöht","Leute mit Diabetes haben niedrigeres Risiko schwer zu erkranken","HR setzt die Chance beider Gruppen ins Verhältnis (Odds)","Schwere Erkrankung als Zielereignis","HR beruht auf Ereignisdatenanalyse"],ans:0,topic:2,exp:"Ein HR von 1,4 bedeutet: das Risiko ist um 40% erhöht (nicht 140%!). (HR-1)×100% = 40%. Außerdem: Das HR setzt nicht Chancen (Odds) ins Verhältnis – das wäre das Odds-Ratio. Das HR ist das Verhältnis von Raten.",fc:"Methoden: Gütekriterien, Statistik (α/β-Fehler, OR, HR, r), Studiendesign"},
{year:"2021",q:"Frage zu Adipositas – Falschaussage:",opts:["Intrauterine Unterversorgung kann zu Adipositas führen","Bei 10% der übergewichtigen Einschulungskinder findet man monogenetische Mutation","Mere-Exposure-Effekt","Emotionale Faktoren können zu Heißhunger führen","In Altersspanne 25–39 ist der Anstieg der Adipösen am größten"],ans:1,topic:1,exp:"Monogenetische Mutationen finden sich bei weniger als 1–2% der übergewichtigen Kinder – nicht bei 10%. Die häufigsten Formen der Adipositas sind polygen und durch Umweltfaktoren mitbedingt.",fc:"Gesundheit & Krankheit: WHO-Definition, Klassifikationssysteme, Diagnose"},
{year:"2021",q:"Akuter vs. chronischer Stress und Immunsystem. Was trifft NICHT zu?",opts:["Andauernder Stress → erhöhtes Cortisol und Glucosewerte","Stress kann indirekt über Verhalten zu Krebs führen","Akuter Stress führt zu Runterregulation der natürlichen Immunantwort","Langfristig hohe Stresslevel → Herabregulation des Immunsystems"],ans:2,topic:10,exp:"Akuter Stress führt zu einer HOCHREGULATION bestimmter Immunfunktionen (kurzfristige adaptive Immunantwort). Chronischer Stress hingegen führt zu Immunsuppression. Die Antwort C ist falsch: Es ist die adaptive Immunantwort, die akut hochreguliert wird.",fc:"Stress: Lazarus (primar/sekundäre Bewertung), AAS (Selye), Karasek, Siegrist"},
{year:"2021",q:"Mann mit 180-Sekunden-Takt am Fließband ist unglücklich. Welches Modell passt?",opts:["Anforderungs-Kontroll-Modell","Gratifikationskrise","Health-Belief","Berufsstagnationsmodell","Leistungs-Diskrepanz-Modell"],ans:0,topic:10,exp:"Das Anforderungs-Kontroll-Modell (Karasek): Hohe Anforderungen + geringer Entscheidungsspielraum (wie beim Fließbandarbeiter mit 180-Sekunden-Takt) führt zu 'high strain' – höchstem Burnout- und Herzerkrankungsrisiko. Das Modell hat die größte empirische Evidenz für Burnout.",fc:"Stress: Lazarus (primar/sekundäre Bewertung), AAS (Selye), Karasek, Siegrist"},
{year:"2021",q:"Frau berichtet nach Gewichtsverlust über Heißhungerattacken. Falschaussage:",opts:["Hoher Leptinspiegel führt zu Heißhungerattacken","Niedriger Ghrelinspiegel führt zu Heißhungerattacken","Verminderte Adipositas-Signale aus Fettgewebe → vermehrtes Hungergefühl","Hypoglykämie fördert Hunger","Emotionale Stimuli können Sättigungsgefühl außer Kraft setzen"],ans:0,topic:1,exp:"Leptin ist das Sättigungshormon – ein HOHER Leptinspiegel hemmt das Hungergefühl. Ein NIEDRIGER Leptinspiegel (nach Gewichtsverlust, wenn Fettmasse sinkt) führt zu erhöhtem Hunger. Antwort A ist also falsch.",fc:"Gesundheit & Krankheit: WHO-Definition, Klassifikationssysteme, Diagnose"},
{year:"2021",q:"Falschaussage zu SES und Gesundheitsversorgung:",opts:["Es besteht kein Zusammenhang zwischen SES und Inanspruchnahme von Vorsorgeleistungen","Zunahme der Zuzahlungen verringert die Inanspruchnahme bei niedrigem SES","GKV-Versicherte geben an, länger auf einen Termin zu warten"],ans:0,topic:6,exp:"Es besteht ein deutlicher Zusammenhang zwischen sozioökonomischem Status und Inanspruchnahme von Vorsorgeleistungen. Personen mit niedrigem SES nehmen Präventionsangebote weniger in Anspruch. Dies ist ein zentrales Problem gesundheitlicher Ungleichheit.",fc:"Soz. Ungleichheit: Sozialgradient, meritokr. Triade, Wilkinson-Deprivation"},
{year:"2025",q:"In der ausführlichen Version des HAPA-Modells: Was gehört zur Handlungskontrolle?",opts:["Intention","Selbstbeobachtung","Bewältigungsplanung","Handlungs-Ergebnis-Erwartung","Selbstwirksamkeitserwartung bzgl. Wiederaufnahme nach Rückfall"],ans:1,topic:14,exp:"Die Handlungskontrolle im HAPA-Modell umfasst: Selbstbeobachtung (Monitoring), Selbstbewertung (Vergleich mit Ziel) und Selbstreaktion (Anpassung). Selbstbeobachtung ist der erste und zentrale Schritt.",fc:"Adhärenz: HAPA-Modell (Schwarzer), SMART, Change-Talk, Motivierende GF"},
{year:"2025",q:"Was trifft auf den demographischen Wandel in Deutschland zu?",opts:["Ambulante und stationäre Behandlung sollte getrennt werden","Durch positiven Wanderungssaldo kommt es zu einer jüngeren Gesellschaft","Durch langsamen Rückgang kardiovaskulärer Erkrankungen nimmt die Lebenserwartung langsamer zu","Durch Geburtenrate >2 wird die Gesellschaft jünger","Lebenserwartung hat in den letzten Jahren sehr stark zugenommen"],ans:4,topic:4,exp:"Die Lebenserwartung in Deutschland ist in den letzten Jahrzehnten deutlich angestiegen – durch bessere medizinische Versorgung und verbesserte Lebensumstände. Deutschland hat mit Alterung zu kämpfen, weil Menschen länger leben und die Geburtenrate (~1,5) unter dem Reproduktionsniveau liegt.",fc:"Demografie: Lebenserwartung, Altenquotient, Geburtenrate, Wanderungssaldo"},
{year:"2025",q:"Alternativhypothese: Unterschied in Prüfungsleistung bei >6h vs. <6h Schlaf. Wie lautet die Nullhypothese?",opts:["Prüfungsleistungen erhöhen sich bei >6h nur bei guter Schlafqualität","Jene mit >6h erzielen durchschnittlich niedrigere Punktzahl","Jene mit >6h erzielen gleiche oder geringere Punktzahl","Schlafqualität hat keinen Einfluss","Es gibt keinen Unterschied zwischen den beiden Gruppen"],ans:4,topic:2,exp:"Die Nullhypothese ist die logische Verneinung der Alternativhypothese. Da die Alternativhypothese einen 'Unterschied' postuliert (ungerichtet), ist die Nullhypothese: 'Es gibt keinen Unterschied.'",fc:"Methoden: Gütekriterien, Statistik (α/β-Fehler, OR, HR, r), Studiendesign"},
{year:"2025",q:"Was trifft auf die Yerkes-Dodson-Regel zu?",opts:["Linearer Anstieg: je mehr Stress, desto mehr Leistung","Linearer Anstieg: je weniger Stress, desto mehr Leistung","Mittelstarker Stress führt zum Leistungsmaximum","Stress ist für körperliche Arbeit leistungsfördernd, für geistige leistungsmindernd","Hoher Stress fördert bei leichten, hemmt bei schweren Aufgaben die Leistung"],ans:2,topic:10,exp:"Das Yerkes-Dodson-Gesetz beschreibt eine umgekehrte U-Kurve: bei mittlerem Erregungsniveau ist die Leistung am höchsten. Zu wenig Stress → Unterforderung, zu viel Stress → Blockade. Für einfache Aufgaben ist ein höherer Erregungsgrad optimal, für komplexe ein niedrigerer.",fc:"Stress: Lazarus (primar/sekundäre Bewertung), AAS (Selye), Karasek, Siegrist"},
{year:"2025",q:"In welchem Piaget-Stadium verstehen Kinder das Konzept der Invarianz (Volumen/Masse bleiben trotz Formänderung gleich)?",opts:["Sensomotorisches Stadium","Prä-operationales Stadium","Konkret-operationales Stadium","Post-operationales Stadium","Formal-operationales Stadium"],ans:2,topic:12,exp:"Das Konzept der Invarianz (Konservierung) wird im konkret-operationalen Stadium erworben (ca. 7–11 Jahre). Im prä-operationalen Stadium (2–7 Jahre) scheitern Kinder noch daran – sie fokussieren auf eine Dimension (Zentrierung).",fc:"Entwicklungspsychologie: Piaget, Erziehungsstile, Pubertät, ToM, Armut"},
{year:"2025",q:"Altenpflegerin mit Burnout – was ist am ehesten Ursache?",opts:["Fehlende positive Anreize","Langeweile","Hohe emotionale Belastung und unerfüllbare Ansprüche an die eigene Arbeit","Zunehmende Differenz zwischen Arbeitsanforderung und positiven Anreizen","Wenige Möglichkeiten zur Gestaltung der Berufsinhalte"],ans:2,topic:10,exp:"Burnout in der Pflege entsteht häufig durch chronische emotionale Erschöpfung bei gleichzeitig hohen Ansprüchen an sich selbst. Die Kombination aus emotionaler Belastung und dem Gefühl, dem eigenen Anspruch nicht gerecht werden zu können, ist ein Kernfaktor.",fc:"Stress: Lazarus (primar/sekundäre Bewertung), AAS (Selye), Karasek, Siegrist"},
{year:"2025",q:"Warum ist die grafische Veranschaulichung des Pearson-r wichtig?",opts:["Höhe des Zusammenhangs sehen","Ursache des Zusammenhangs erkennen","Art bzw. Form des Zusammenhangs erkennen","Reliabilität prüfen","Signifikanz sehen"],ans:2,topic:2,exp:"Der Pearson-r erfasst nur lineare Zusammenhänge. Ein gleicher r-Wert kann sehr unterschiedliche Datenmuster beschreiben (Anscombe-Quartett). Die grafische Darstellung zeigt die Form: linear, kurvilinear, mit Ausreißern? Ein r=0 könnte einen perfekten U-förmigen Zusammenhang maskieren.",fc:"Methoden: Gütekriterien, Statistik (α/β-Fehler, OR, HR, r), Studiendesign"},
{year:"2025",q:"Welches Attribut gehört zu primären Emotionen?",opts:["Geringe Erblichkeit","Sozialer Auslöser","Spezifische Immunantwort","Spezifische Mimik","Spezifische Alltagsrelevanz"],ans:3,topic:7,exp:"Primäre (Basis-)Emotionen nach Ekman haben eine spezifische, kulturuniverselle Mimik. Sie sind evolutionär konserviert, angeboren und zeigen sich weltweit in allen Kulturen gleich. Sekundäre Emotionen sind sozial erlernt und kulturabhängig.",fc:"Emotionen: Basisemotionen (Ekman), primär vs. sekundär, Mimik, FACS"},
{year:"2025",q:"Welcher Erziehungsstil ist nachweislich am förderlichsten für eine gesunde Entwicklung?",opts:["Autoritativ-partizipativ","Autoritär","Antiautoritativ-diskursiv","Laissez-faire","Ängstlich-schützend"],ans:0,topic:12,exp:"Der autoritative (partizipative) Erziehungsstil kombiniert hohe emotionale Wärme mit klaren, konsistenten Anforderungen. Dieser Stil fördert Selbstständigkeit, Selbstregulation und soziale Kompetenz.",fc:"Entwicklungspsychologie: Piaget, Erziehungsstile, Pubertät, ToM, Armut"},
{year:"2025",q:"Ärztin fragt: 'Wie viel Kontrolle über Arbeitssituation?' und 'Wie hoch ist die Belastung?' Welches Modell?",opts:["Anforderungs-Kontroll-Modell","Modell der beruflichen Gratifikationskrisen","Health-Belief-Modell","HAPA","Transaktionales Stressmodell"],ans:0,topic:10,exp:"Das Anforderungs-Kontroll-Modell (Karasek) hat genau zwei Dimensionen: Arbeitsanforderungen und Entscheidungsspielraum. Die zwei Fragen der Ärztin entsprechen exakt diesen beiden Modellachsen.",fc:"Stress: Lazarus (primar/sekundäre Bewertung), AAS (Selye), Karasek, Siegrist"},
{year:"2025",q:"HAPA-Modell – was passt am besten zur Volitionsphase?",opts:["Zielintention → Handlungsplanung → Handlungsdurchführung","Handlungs-Ergebnis-Erwartung → Zielintention und Verhaltensänderung → Handlungskontrolle","Selbstwirksamkeit bzgl. Rückfall → Handlungskontrolle und Initiation → Handlung","Risikowahrnehmung → Handlungsergebniserwartung und Zielintention → Handlungskontrolle","Handlungsergebniserwartung → Verhaltensintention und Rückfallplanung → Handlungsabbruch"],ans:0,topic:14,exp:"Die Volitionsphase beginnt nach der Bildung einer Zielintention. Sie umfasst: Zielintention → Handlungsplanung (Wann, Wo, Wie?) → Handlungsdurchführung.",fc:"Adhärenz: HAPA-Modell (Schwarzer), SMART, Change-Talk, Motivierende GF"},
{year:"2025",q:"§1 SGB V vervollständigen: 'Die Krankenversicherung als Solidargemeinschaft hat die Aufgabe...'",opts:["...die Gesundheit der Versicherten zu erhalten, wiederherzustellen oder zu bessern","...die Gesundheit zu erhalten und insbesondere des medizinischen Personals","...die Bedürfnisse der Solidargemeinschaft zu priorisieren","...die Gesundheit wiederherzustellen und Lebenszufriedenheit zu erhöhen","...die Arbeitsfähigkeit der Bevölkerung zu sichern"],ans:0,topic:11,exp:"§1 SGB V: Die GKV hat als Solidargemeinschaft die Aufgabe, die Gesundheit der Versicherten zu erhalten, wiederherzustellen oder zu verbessern. Der Wortlaut enthält die drei Aspekte: erhalten, wiederherstellen, bessern.",fc:"Gesundheitssystem: GKV/PKV, G-BA, KBV, Sach-/Kostenerstattung, SAPV"},
{year:"2025",q:"Hypertonien in drei Kategorien: 140/90, 160/100, <180/120. Welcher Norm entspricht das?",opts:["Statistische Norm","Funktionelle Norm","Therapeutische Norm","Kulturelle Norm","Ideal-Norm"],ans:2,topic:1,exp:"Die Klassifikation von Hypertoniestufen entspricht einer therapeutischen Norm: Sie basiert darauf, ab welchem Grenzwert eine Behandlung zur Vermeidung von Komplikationen notwendig ist. Diese Grenzwerte werden von Fachgesellschaften auf Basis von Studiendaten festgelegt.",fc:"Gesundheit & Krankheit: WHO-Definition, Klassifikationssysteme, Diagnose"},
{year:"2025",q:"Forscher ordnet 20 Items nach Korrelation zur Gesamtpunktzahl. Welches Kriterium liegt zugrunde?",opts:["Trennschärfe","Schwierigkeit","Sensitivität","Negativer Prädiktionswert","Reliabilität"],ans:0,topic:2,exp:"Die Trennschärfe (item-total-correlation) gibt an, wie gut ein einzelnes Item mit der Gesamtskala korreliert. Bei der Itemselektion wird die Trennschärfe als zentrales Kriterium verwendet.",fc:"Methoden: Gütekriterien, Statistik (α/β-Fehler, OR, HR, r), Studiendesign"},
{year:"2025",q:"Integratives Modell der Emotionsverarbeitung: Welche Aussage stimmt?",opts:["Bewusste Bewertung beeinflusst direkt die subjektive Erfahrung","Bewusste Bewertung beeinflusst direkt den Ausdruck","Bewusste Bewertung beeinflusst direkt das physiologische Muster","Unbewusste Bewertung beeinflusst Wahrnehmung","Bewusste Bewertung beeinflusst die Wahrnehmung"],ans:0,topic:7,exp:"Im integrativen Modell nach Lazarus/Schachter beeinflusst die kognitive (bewusste) Bewertung (appraisal) direkt das subjektive emotionale Erleben. Lazarus betonte: Es ist unsere Bewertung der Situation, die die emotionale Erfahrung bestimmt.",fc:"Emotionen: Basisemotionen (Ekman), primär vs. sekundär, Mimik, FACS"},
{year:"2025",q:"Patient sagt nach Aufklärung: 'Bin zuversichtlich, Medikamente trotz Zeitmangels öfter einzunehmen.' Welcher HAPA-Aspekt?",opts:["Barrieren der Umwelt durch Zeitmangel","Handlungs-Ergebnis-Erwartung","Selbstwirksamkeitserwartung","Zielintention","Risikowahrnehmung"],ans:2,topic:14,exp:"'Zuversicht, trotz Hindernissen das Verhalten ausführen zu können' ist die Definition der Selbstwirksamkeitserwartung (nach Bandura). Im HAPA-Modell ist die Selbstwirksamkeit entscheidend für die Umsetzung der Intention in Verhalten – besonders bei Barrieren.",fc:"Adhärenz: HAPA-Modell (Schwarzer), SMART, Change-Talk, Motivierende GF"},
{year:"2025",q:"Ottawa-Charta – Richtigaussage:",opts:["Gesundheitsförderliche Umwelt schaffen (Setting-Ansatz)","Bezogen auf Risikofaktoren im Alter","Kuration vor Prävention","Rehabilitation vor Kuration","Spezieller Fokus auf Hochrisikopatienten"],ans:0,topic:13,exp:"Die Ottawa-Charta (1986) definiert fünf Handlungsfelder, darunter die Schaffung gesundheitsförderlicher Lebenswelten (Setting-Ansatz). Gesundheitsförderung findet dort statt, wo Menschen leben, lernen und arbeiten.",fc:"Prävention: Primär/Sekundär/Tertiär, Ottawa-Charta, Präventionsparadox"},
{year:"2025",q:"Frau kommt seit dem 40. Lj. jährlich zum Hautkrebsscreening. Um welche Vorsorge handelt es sich?",opts:["Primär","Primordial","Sekundär","Tertiär","Quartär"],ans:2,topic:13,exp:"Sekundäre Prävention zielt auf Früherkennung bei noch symptomloser Erkrankung – z.B. Screening-Programme. Das Ziel ist die Früherkennung, um die Prognose zu verbessern.",fc:"Prävention: Primär/Sekundär/Tertiär, Ottawa-Charta, Präventionsparadox"},
{year:"2025",q:"'Stressreaktion ist Resultat der Bewertung der Umwelt und der eigenen Ressourcen.' Welches Modell?",opts:["Allgemeines Anpassungssyndrom","Anforderungs-Kontroll-Modell","Transaktionales Stressmodell nach Lazarus","Homöostasemodell","Stimulustheorie"],ans:2,topic:10,exp:"Das transaktionale Stressmodell nach Lazarus betont die subjektive kognitive Bewertung: primäre Bewertung und sekundäre Bewertung der Ressourcen. Stress entsteht, wenn Anforderungen die wahrgenommenen Ressourcen übersteigen.",fc:"Stress: Lazarus (primar/sekundäre Bewertung), AAS (Selye), Karasek, Siegrist"},
{year:"2025",q:"RCT: 2 Physio-Maßnahmen nach Bänderdehnung, bewertet wird gesundheitsbezogene Lebensqualität. Was ist die abhängige Variable?",opts:["Physiotherapiemaßnahmen","Bänderdehnung","Alter","Geschlecht","Gesundheitsbezogene Lebensqualität"],ans:4,topic:2,exp:"Die abhängige Variable ist das Merkmal, das gemessen wird. Hier ist die Physiotherapiemaßnahme die unabhängige Variable (Intervention), die gesundheitsbezogene Lebensqualität die abhängige Variable (Outcome).",fc:"Methoden: Gütekriterien, Statistik (α/β-Fehler, OR, HR, r), Studiendesign"},
{year:"2025",q:"Falschaussage zur Einordnung als schwerwiegend chronisch krank:",opts:["Mindestens 1× pro Quartal in ärztlicher Behandlung seit mind. 1 Jahr","GdB von mindestens 60","Kontinuierliche Behandlung nötig, ohne die Verschlimmerung droht","Auftreten der Krankheit in ICF-Klassifikation","Pflegegrad von mindestens III"],ans:3,topic:1,exp:"Das Auftreten in der ICF-Klassifikation ist KEIN Kriterium der deutschen Definition. Die drei Kriterien sind: GdB ≥60, Pflegegrad ≥3, oder lebensbedrohliche Verschlimmerung ohne kontinuierliche Behandlung.",fc:"Gesundheit & Krankheit: WHO-Definition, Klassifikationssysteme, Diagnose"},
{year:"2025",q:"Was gehört NICHT zu den Fennell-Phasen?",opts:["Krise","Aggression","Resolution","Integration","Stabilisierung"],ans:1,topic:15,exp:"Die Fennell-Phasen sind: (1) Krise, (2) Stabilisierung, (3) Resolution, (4) Integration. Aggression ist keine der vier Phasen.",fc:"Krankheitsbewältigung: Fennell-Phasen, Resilienz, Psychoonkologie, HRQoL"},
{year:"2025",q:"Theory of Mind – welche Aussage trifft zu?",opts:["Die meisten 2,5-Jährigen haben ein Verständnis falscher Vorstellungen","Die meisten 4-Jährigen machen den False-Belief-Fehler","Kinder verstehen Überzeugungen früher als Wünsche","Kinder verstehen sehr früh, dass Menschen verschiedene Wünsche haben","Kinder können bereits früh höhere kognitive Leistungen erbringen"],ans:3,topic:12,exp:"Schon früh (ab ca. 18 Monaten) verstehen Kinder, dass andere Menschen andere Wünsche haben können. Das Verständnis falscher Überzeugungen (False Belief) entwickelt sich erst um das 4.–5. Lebensjahr.",fc:"Entwicklungspsychologie: Piaget, Erziehungsstile, Pubertät, ToM, Armut"},
{year:"2025",q:"Rollenbildung nach Krappmann – was ist KEINE Grundkompetenz zur Ich-Identität?",opts:["Identitätsdarstellung","Empathie (Role-Taking)","Rollendistanz","Stressbewältigung","Ambiguitätstoleranz"],ans:3,topic:9,exp:"Die vier Grundkompetenzen nach Krappmann: Rollendistanz, Empathie/Role-Taking, Ambiguitätstoleranz, Identitätsdarstellung. 'Stressbewältigung' ist keine der vier Kernkompetenzen.",fc:"Sozialisation: Primär/Sekundär, Hurrelmann, Erikson-Phasen, Krappmann"},
{year:"2025",q:"Was trifft auf Prävention zu (im Vergleich zu Gesundheitsförderung)?",opts:["Empowerment fördern","Personenbezogene Verhaltens- und Krankheitsrisiken verringern","Soziale Fähigkeiten fördern","Soziales Umfeld erweitern","Capacity-Building"],ans:1,topic:13,exp:"Prävention zielt auf die Verringerung von Krankheitsrisiken (pathogenetische Perspektive). Gesundheitsförderung zielt auf Ressourcenstärkung (Empowerment, Capacity-Building) – salutogenetische Perspektive.",fc:"Prävention: Primär/Sekundär/Tertiär, Ottawa-Charta, Präventionsparadox"},
{year:"2025",q:"Dual Processing Model – was trifft auf exekutive Kontrolle zu?",opts:["Wird durch Verhalten konditioniert","Nicht Existierendes kann nicht kognitiv abgebildet werden","Verantwortlich für Erhalt der Homöostase","Wird stark von Umweltbedingungen beeinflusst","Einfluss eigener Wertvorstellungen"],ans:4,topic:8,exp:"Exekutive Kontrolle (System 2) ermöglicht bewusste, rationale Entscheidungen unter Einfluss von Werten, Zielen und Überzeugungen. Wertvorstellungen sind ein zentrales Element der bewussten Handlungssteuerung.",fc:"Motivation: Selbstwirksamkeit (Bandura), Health-Belief-Modell, Heuristiken"},
{year:"2025",q:"Was stimmt zum Langzeitgedächtnis NICHT?",opts:["Am besten erinnert man sich an Inhalte aus der Mitte einer Unterhaltung","Neue Inhalte können das Erinnern von alten Inhalten stören","Abruf am besten wenn Hinweisreize bei Enkodierung und Abruf übereinstimmen","Kann sehr langfristig gespeichert werden","Schlafmangel nimmt Einfluss auf die Gedächtnisleistung"],ans:0,topic:5,exp:"Der serielle Positionseffekt zeigt das Gegenteil: Am besten erinnert man sich an Inhalte vom ANFANG (Primacy-Effekt) und vom ENDE (Recency-Effekt). Inhalte aus der MITTE werden am schlechtesten erinnert.",fc:"Gedächtnis: Episodisch, Semantisch, Prozedural, Priming, Amnesieformen"},
{year:"2025",q:"Das Lernen am Modell ist einfacher, wenn...",opts:["...das Modell dem Lernenden ähnlich ist","...das Modell verwandt ist","...das Verhalten verdeckt beobachtet wird","...das Verhalten so einfach ist, dass man es kaum nachahmen muss","...das Modell gegenkonditioniert ist"],ans:0,topic:3,exp:"Beim Beobachtungslernen (Bandura) ist die Ähnlichkeit zwischen Modell und Lernenden ein entscheidender Faktor. Weitere förderliche Faktoren: Modell wird belohnt (stellvertretende Verstärkung), hohe Aufmerksamkeit.",fc:"Lernen: Klassische/Operante Konditionierung, Beobachtungslernen (Bandura)"},
{year:"2025",q:"SORCK – wozu passen Verstärkerpläne?",opts:["Stimulus","Organismus","Konsequenz","Kontingenz","Reaktion"],ans:3,topic:3,exp:"Verstärkerpläne beschreiben die zeitliche Regelung (Kontingenz = C), nach der eine Reaktion Konsequenzen hat. Intermittierende Verstärkerpläne (z.B. variable ratio) sind besonders löschungsresistent.",fc:"Lernen: Klassische/Operante Konditionierung, Beobachtungslernen (Bandura)"},
{year:"2025",q:"Falschaussage zu Hazard-Ratio 1,4 (KI 1,1–1,8):",opts:["Risiko ist für Risikogruppe 40% erhöht","Querschnittsstudie","Ist statistisch signifikant","Risiko 1,4-fach höher","Ereigniszeitanalyse"],ans:1,topic:2,exp:"Ein HR entsteht aus der Überlebenszeitanalyse (Ereignisdatenanalyse/Cox-Regression) – das ist eine Längsschnittmethode, KEINE Querschnittsstudie.",fc:"Methoden: Gütekriterien, Statistik (α/β-Fehler, OR, HR, r), Studiendesign"},
{year:"2025",q:"Was trifft auf den Beta-Fehler zu?",opts:["H1 wird angenommen, obwohl H0 richtig ist","H0 wird angenommen, obwohl H1 richtig ist"],ans:1,topic:2,exp:"Der Beta-Fehler (Typ-II): H0 wird angenommen (kein Effekt), obwohl H1 in der Realität gilt (Effekt existiert). Man 'übersieht' einen echten Effekt.",fc:"Methoden: Gütekriterien, Statistik (α/β-Fehler, OR, HR, r), Studiendesign"},
{year:"2025",q:"Frau nach Raubüberfall: erinnert Weg davor und danach, nicht den Tathergang. Worum handelt es sich?",opts:["Dissoziative Amnesie","Retrograde Amnesie","Anterograde Amnesie","Agnosie","Korsakow-Syndrom"],ans:0,topic:5,exp:"Dissoziative Amnesie: selektiver Gedächtnisverlust für das traumatische Ereignis ohne organische Ursache. Erinnerungen davor und danach sind intakt – als psychologischer Schutzmechanismus.",fc:"Gedächtnis: Episodisch, Semantisch, Prozedural, Priming, Amnesieformen"},
{year:"2024",q:"Patient kann nicht 2× wöchentlich schwimmen – Hallenbad geschlossen. Welche HAPA-Komponente?",opts:["Selbstwirksamkeitserwartungen","Komponente der Handlungskontrolle","Ressourcen und Barrieren aus der Umwelt","Handlungs-Ergebnis-Erwartungen","Bewältigungsplan"],ans:2,topic:14,exp:"Das geschlossene Hallenbad ist eine externe Barriere aus der Umwelt. Im HAPA-Modell werden Ressourcen und Barrieren (intern wie extern) als wichtige Faktoren im volitionalen Prozess berücksichtigt.",fc:"Adhärenz: HAPA-Modell (Schwarzer), SMART, Change-Talk, Motivierende GF"},
{year:"2024",q:"Was hat den größten Einfluss auf den demographischen Wandel in Deutschland?",opts:["Stagnation der Lebenserwartung","Kompression der Lebenserwartung","Dynamisches Gleichgewicht","Zunahme der Lebenserwartung","Abnahme der Lebenserwartung"],ans:3,topic:4,exp:"Die Zunahme der Lebenserwartung ist der wesentlichste Treiber des demographischen Wandels. Bei gleichzeitig niedriger Geburtenrate (ca. 1,5 Kinder) ergibt sich eine alternde Gesellschaft.",fc:"Demografie: Lebenserwartung, Altenquotient, Geburtenrate, Wanderungssaldo"},
{year:"2024",q:"'Teufelskreis der Angst' – was trifft NICHT zu?",opts:["Modell zur Erklärung von Angststörungen","Beschreibt verschiedene körperliche Veränderungen","Kann durch äußere und innere Reize gestartet werden","Beschreibt den Einfluss von Selbstwahrnehmung auf Angst","Vermeidung unterbricht die Angstabwärtsspirale"],ans:4,topic:1,exp:"Im Teufelskreis der Angst ist Vermeidung KEIN Mittel zur Unterbrechung – sie VERSTÄRKT die Angst langfristig (negative Verstärkung). Exposition ist der wirksame Weg zur Unterbrechung.",fc:"Gesundheit & Krankheit: WHO-Definition, Klassifikationssysteme, Diagnose"},
{year:"2024",q:"Welchen Wert kann Hazard-Ratio NICHT annehmen?",opts:["5,0","1,5","0,75","0,08","-1,25"],ans:4,topic:2,exp:"Das Hazard-Ratio kann nur positive Werte annehmen (> 0). Negative Werte sind mathematisch unmöglich. HR = 1: kein Unterschied; HR > 1: erhöhtes Risiko; 0 < HR < 1: reduziertes Risiko.",fc:"Methoden: Gütekriterien, Statistik (α/β-Fehler, OR, HR, r), Studiendesign"},
{year:"2024",q:"Definition Selbstwirksamkeitserwartung:",opts:["Überzeugung zu erreichen, was andere erwarten","Dass es eine gute Therapie geben wird","Erwartung eines guten Krankheitsverlaufs","Überzeugung, eine Erkrankung zu bekommen","Überzeugung, ein Verhalten mit eigenen Ressourcen schaffen zu können"],ans:4,topic:8,exp:"Selbstwirksamkeitserwartung (Bandura): die subjektive Überzeugung, ein bestimmtes Verhalten mit den eigenen Ressourcen ausführen zu können – auch angesichts von Hindernissen.",fc:"Motivation: Selbstwirksamkeit (Bandura), Health-Belief-Modell, Heuristiken"},
{year:"2024",q:"Patient verschiebt Vorsorgetermin wegen Angst vor Prostatakarzinom. Lerntheorie?",opts:["Instrumentelle Konditionierung mit Verstärkerentzug","Klassische Konditionierung der Angst","Modellernen der Hemmung","Operante Konditionierung durch negative Verstärkung","Instrumentelle Konditionierung mit positivem Verstärker"],ans:3,topic:3,exp:"Negative Verstärkung: Das Aufschieben beseitigt kurzfristig die Angst (aversiver Reiz) – dieses Verschwinden verstärkt das Vermeidungsverhalten. Langfristig wird es immer stärker konditioniert.",fc:"Lernen: Klassische/Operante Konditionierung, Beobachtungslernen (Bandura)"},
{year:"2024",q:"Itemanalyse – welche Aspekte werden untersucht?",opts:["Sensitivität und Schwierigkeit","Schwierigkeit und Trennschärfe","Trennschärfe und Fairness","Objektivität und Trennschärfe","Trennschärfe und Spezifität"],ans:1,topic:2,exp:"Die Itemanalyse untersucht: (1) Schwierigkeit und (2) Trennschärfe. Diese beiden Kennwerte entscheiden, welche Items für den finalen Test ausgewählt werden.",fc:"Methoden: Gütekriterien, Statistik (α/β-Fehler, OR, HR, r), Studiendesign"},
{year:"2024",q:"RCT zu Adipositas-Therapie – was trifft bei guter klinischer Praxis NICHT zu?",opts:["(erste Option fehlte)","Primärer Endpunkt sollte vor Studiendurchführung definiert werden","Ein-/Ausschlusskriterien werden vorher festgelegt","Stichprobe sollte repräsentativ ausgewählt sein","BMI und Taillenumfang können als unabhängige Variable verwendet werden"],ans:4,topic:2,exp:"In einem RCT zur Therapiewirksamkeit sind BMI und Taillenumfang abhängige Variablen (Outcome-Maße), KEINE unabhängigen Variablen. Die unabhängige Variable ist die Intervention.",fc:"Methoden: Gütekriterien, Statistik (α/β-Fehler, OR, HR, r), Studiendesign"},
{year:"2024",q:"Was trifft auf die Entwicklung kognitiver Fähigkeiten über die Lebensspanne zu?",opts:["Zwischen 20. und 60. Lj. kein Abbau","Ab dem 30. Lj. numerische Fähigkeiten ab","Um das 50. Lj. Maximum der kognitiven Fähigkeiten","Ab dem 60. Lj. verbale Fähigkeiten und verbales Gedächtnis ab","Um das 60. Lj. räumliche Orientierung, Wahrnehmungsgeschwindigkeit und Rechenfähigkeiten ab"],ans:4,topic:12,exp:"Fluide Fähigkeiten (räumliche Orientierung, Verarbeitungsgeschwindigkeit, Rechnen) beginnen um das 60. Lj. deutlich abzunehmen. Kristalline Intelligenz (Wortschatz, Wissen, verbale Fähigkeiten) bleibt viel länger stabil.",fc:"Entwicklungspsychologie: Piaget, Erziehungsstile, Pubertät, ToM, Armut"},
{year:"2024",q:"Lebensqualität von Krebskranken – was stimmt?",opts:["EORTC vergleicht Krebskranke mit Allgemeinbevölkerung","SF-36 erfasst allgemein die Lebensqualität","Krebsspezifische Fragebögen erlauben Rückschlüsse auf Gesamtbevölkerung","Generische Fragebögen haben krebsspezifische Antworten","Patient-Reported-Outcome für Medikamentenentwicklung"],ans:1,topic:15,exp:"Der SF-36 ist ein generischer Fragebogen für gesundheitsbezogene Lebensqualität – nicht krankheitsspezifisch. Er kann auf alle Bevölkerungsgruppen angewendet werden. Der EORTC QLQ-C30 dagegen ist krebsspezifisch.",fc:"Krankheitsbewältigung: Fennell-Phasen, Resilienz, Psychoonkologie, HRQoL"},
{year:"2024",q:"Frau W. mit COPD plant nach Verschlechterung, mit dem Rauchen aufzuhören. Prävention?",opts:["Primordiale Prävention","Primäre Prävention","Sekundäre Prävention","Tertiäre Prävention","Quartäre Prävention"],ans:3,topic:13,exp:"Tertiäre Prävention zielt auf die Verhinderung der Verschlimmerung einer bereits bestehenden Erkrankung. Da Frau W. bereits seit 8 Jahren an COPD erkrankt ist, ist der Rauchstopp jetzt tertiäre Prävention.",fc:"Prävention: Primär/Sekundär/Tertiär, Ottawa-Charta, Präventionsparadox"},
{year:"2024",q:"Was trifft NICHT zu auf kognitive Fähigkeiten von Kindern in Armut?",opts:["Entwickeln eher arterielle Hypertonie im Erwachsenenalter","Niedriger Bildungsstand der Eltern → verringerte kognitive Fähigkeiten","Kognitive Defizite sind ab dem 7. Lebensjahr zu sehen","Armut hat keinen Einfluss auf kognitive Fähigkeiten","Je länger in Armut, desto geringer das Arbeitsgedächtnis"],ans:2,topic:12,exp:"Kognitive Defizite bei Kindern in Armut zeigen sich schon ab dem 7. MONAT (nicht 7. Jahr) – durch chronischen Stress, fehlende Stimulation und mangelnde Ernährung.",fc:"Entwicklungspsychologie: Piaget, Erziehungsstile, Pubertät, ToM, Armut"},
{year:"2024",q:"Was trifft auf die fetale Programmierung NICHT zu?",opts:["Kann durch Noxen ausgelöst werden","Ist nur von kurzer Dauer und hat keinen Einfluss auf spätere Leistungsfähigkeit","Sensible Phasen haben zu verschiedenen Zeitpunkten ihre Maxima","Anpassung des Fetus an intrauterines Milieu","Ist ein Determinant des späteren Erkrankungsrisikos"],ans:1,topic:12,exp:"Fetale Programmierung hat LANGFRISTIGE Auswirkungen – sie ist gerade NICHT von kurzer Dauer. Noxen in sensiblen Phasen können die Organentwicklung dauerhaft verändern (Barker-Hypothese/DOHaD).",fc:"Entwicklungspsychologie: Piaget, Erziehungsstile, Pubertät, ToM, Armut"},
{year:"2024",q:"Was ist KEINE Art der klassischen Konditionierung?",opts:["Verzögerte Konditionierung","Spurenkonditionierung","Simultane Konditionierung","Beschleunigte Konditionierung","Rückwärtskonditionierung"],ans:3,topic:3,exp:"'Beschleunigte Konditionierung' ist kein etablierter Begriff. Die klassischen Typen: Verzögerte Konditionierung, Spurenkonditionierung, Simultane Konditionierung, Rückwärtskonditionierung.",fc:"Lernen: Klassische/Operante Konditionierung, Beobachtungslernen (Bandura)"},
{year:"2024",q:"Wie hat die WHO 1946 'Gesundheit' definiert?",opts:["Zustand vollständigen psychischen, sozialen und körperlichen Wohlbefindens und NICHT NUR die Abwesenheit von Krankheit","Zustand vollständigen psychischen, soziologischen und körperlichen Wohlbefindens und nicht die Abwesenheit","Zustand psychischen, sozialen und körperlichen Wohlbefindens und nicht nur die Abwesenheit","Zustand psychischen, sozialen und körperlichen Wohlbefindens und nicht die Abwesenheit","Zustand psychischen, sozialen und körperlichen Wohlbefindens und die Abwesenheit"],ans:0,topic:1,exp:"Die WHO-Definition von 1946: 'Gesundheit ist ein Zustand des vollständigen körperlichen, geistigen und sozialen Wohlbefindens und nicht nur das Fehlen von Krankheit oder Gebrechen.' Wichtig: 'vollständig' und 'nicht NUR'.",fc:"Gesundheit & Krankheit: WHO-Definition, Klassifikationssysteme, Diagnose"},
{year:"2024",q:"Kollegin sagt '20% hat schon einmal eine Depression erlitten.' Welcher Begriff?",opts:["Lebenszeitinzidenz","Lebenszeitprävalenz","Kumulative Prävalenz","Inanspruchnahmeprävalenz","Klassifizierungs-Prävalenz"],ans:1,topic:2,exp:"Lebenszeitprävalenz: Anteil der Personen, die im Laufe ihres Lebens mindestens einmal an einer Erkrankung litten. 'Schon einmal' → Lebenszeitprävalenz.",fc:"Methoden: Gütekriterien, Statistik (α/β-Fehler, OR, HR, r), Studiendesign"},
{year:"2024",q:"Doktorantin lässt Versuchsanweisungen weg. Was ist am stärksten beeinträchtigt?",opts:["Objektivität","Inhaltsvalidität","Retest-Reliabilität","Ökonomie","Konstruktvalidität"],ans:0,topic:2,exp:"Durchführungsobjektivität ist verletzt wenn Testbedingungen nicht standardisiert sind. Wenn Instruktionen fehlen, hängt das Ergebnis von der Versuchsleiterin ab.",fc:"Methoden: Gütekriterien, Statistik (α/β-Fehler, OR, HR, r), Studiendesign"},
{year:"2024",q:"Welches Kriterium wird für 'Persönlichkeit' NICHT herangezogen?",opts:["Transsituative Konsistenz","Zeitstabilität","Genetische Faktoren","Psychische Faktoren","Typische Verhaltensweisen"],ans:2,topic:9,exp:"Persönlichkeit wird definiert durch zeitliche Stabilität, transsituative Konsistenz und typische Verhaltensweisen. Genetische Faktoren sind Einflussgrößen, aber kein definierendes Kriterium.",fc:"Sozialisation: Primär/Sekundär, Hurrelmann, Erikson-Phasen, Krappmann"},
{year:"2024",q:"Theory of Mind – was ist NICHT richtig?",opts:["1,5-Jährige verstehen Unterschiede zwischen Wünschen","Mit 1,5 Jahren ist die ToM komplett ausgeprägt","False Belief vorhanden → ToM nicht vollständig entwickelt","2-Jährige verstehen, dass andere anders fühlen können","(weitere Option)"],ans:1,topic:12,exp:"Die ToM ist mit 1,5 Jahren definitiv NICHT vollständig ausgeprägt. Das Verständnis falscher Überzeugungen (False Belief) entwickelt sich erst um das 4.–5. Lebensjahr.",fc:"Entwicklungspsychologie: Piaget, Erziehungsstile, Pubertät, ToM, Armut"},
{year:"2024",q:"Was beschreibt Assimilation (nach Piaget) am ehesten?",opts:["Kind liest Buch und vertieft sich in den Inhalt","Kind liest Buch und integriert Tiere in bekannte Schemata","Kind liest Buch und erstellt neue Gruppen für die Tiere","Kind merkt sich sofort alle Tiere","Kind versetzt sich in Charaktere ein"],ans:1,topic:12,exp:"Assimilation: neue Informationen werden in vorhandene Schemata eingeordnet, ohne das Schema zu verändern. Das Kind ordnet neue Tiere im Bilderbuch in sein vorhandenes Schema ein.",fc:"Entwicklungspsychologie: Piaget, Erziehungsstile, Pubertät, ToM, Armut"},
{year:"2024",q:"Effektstärke – was wird ins Verhältnis gesetzt?",opts:["Differenz Mittelwerte zur Summe aller Mittelwerte","Varianz zur Standardabweichung","Standardabweichung zum Konfidenzintervall","Beide Standardabweichungen zueinander","Differenz der Mittelwerte zur Standardabweichung"],ans:4,topic:2,exp:"Cohens d = (M1 - M2) / SD_pooled. Differenz der Mittelwerte dividiert durch die gepoolte Standardabweichung. Konventionen: d=0,2 klein, d=0,5 mittel, d=0,8 groß.",fc:"Methoden: Gütekriterien, Statistik (α/β-Fehler, OR, HR, r), Studiendesign"},
{year:"2024",q:"Patientin: 'Wenn mein Test negativ war – bin ich wirklich nicht erkrankt?' Welcher Wert?",opts:["Sensitivität","Positiver Prädiktionswert","Spezifität","Negativer Prädiktionswert","Objektive Spezifität"],ans:3,topic:2,exp:"Der negative prädiktive Wert (NPV): Wenn ein Test negativ ist – wie wahrscheinlich ist tatsächliche Nicht-Erkrankung? NPV = Richtig Negative / (Richtig Negative + Falsch Negative).",fc:"Methoden: Gütekriterien, Statistik (α/β-Fehler, OR, HR, r), Studiendesign"},
{year:"2024",q:"Odds-Ratio = 4 (Frauen vs. Männer, Depression), KI 1,9–5,9. Welche Aussage stimmt?",opts:["Chance an Depressionen zu erkranken ist für Frauen 4× höher als für Männer","Auf eine erkrankte Frau kommen vier erkrankte Männer","OR von vier ist statistisch nicht signifikant","Männer haben als Vergleichsgruppe einen Wert von 0","Chance bei Frauen 4 SD erhöht"],ans:0,topic:2,exp:"OR = 4: Die Chance der Frauen zu erkranken ist 4-mal höher als die der Männer (Referenzgruppe OR=1). KI 1,9–5,9 schließt die 1 nicht ein → statistisch signifikant.",fc:"Methoden: Gütekriterien, Statistik (α/β-Fehler, OR, HR, r), Studiendesign"},
{year:"2024",q:"Anteil der Krebspatienten, die psychischen Distress erleben:",opts:["5–10%","10–20%","50–65%","Jeder Krebspatient","Keiner"],ans:2,topic:15,exp:"Ca. 50–65% der Krebspatientinnen erleben psychischen Distress. Daher ist psychoonkologische Versorgung integraler Bestandteil der Krebstherapie.",fc:"Krankheitsbewältigung: Fennell-Phasen, Resilienz, Psychoonkologie, HRQoL"},
{year:"2024",q:"Demenzerkrankungen – welche Aussage stimmt NICHT?",opts:["MCI ist ein Risikofaktor/Vorstufe","Degenerative Demenzen entstehen aus Delir und sind reversibel","Demenzen führen zu Beeinträchtigungen im Alltag","Demenzen müssen durch Verschlechterung des Grundzustandes abgrenzbar sein"],ans:1,topic:1,exp:"Degenerative Demenzen (Alzheimer etc.) entstehen NICHT aus einem Delir und sind NICHT reversibel. Ein Delir ist eine akute, oft reversible Verwirrtheit. Degenerative Demenzen sind chronisch-progredient.",fc:"Gesundheit & Krankheit: WHO-Definition, Klassifikationssysteme, Diagnose"},
{year:"2024",q:"Zusammenhang Vulnerabilität und Schweregrad bei Risikowahrnehmung?",opts:["Addition","Subtraktion","Multiplikation","Division","Potenzierung"],ans:2,topic:8,exp:"Im Health-Belief-Modell wird die Risikowahrnehmung durch wahrgenommene Vulnerabilität × Schweregrad bestimmt (Multiplikation). Wenn eine der Dimensionen Null ist, wird keine Handlung ausgelöst.",fc:"Motivation: Selbstwirksamkeit (Bandura), Health-Belief-Modell, Heuristiken"},
{year:"2024",q:"Pfleger: anstrengende Arbeit, geringe Aufstiegschancen, wünscht Wertschätzung. Welches Modell?",opts:["Gratifikationskrise","Anforderungs-Kontrollmodell","HAPA","Leistungs-Diskrepanz-Modell","Berufsstagnationsmodell"],ans:0,topic:10,exp:"Das Gratifikationskrisenmodell (Siegrist): hohe Verausgabung bei geringer Belohnung (Geld, Anerkennung, Aufstieg). Der Pfleger verausgabt sich und erhält wenig zurück → Gratifikationskrise.",fc:"Stress: Lazarus (primar/sekundäre Bewertung), AAS (Selye), Karasek, Siegrist"},
{year:"2024",q:"Was beschreibt am ehesten den volitionalen Prozess im HAPA-Modell?",opts:["Handlungsergebniserwartung → Zielintention und Handlungsplan → Handlungsveränderung","Zielintention → Handlungsplan → Handlungsveränderung","Selbstwirksamkeit bzgl. Rückfall und Handlungs-Ergebnis-Erwartung","(weitere Option)"],ans:1,topic:14,exp:"Der volitionale Prozess: Zielintention → Handlungsplanung (Wann? Wo? Wie?) → Handlungsdurchführung. Die Handlungsplanung (Implementation Intentions) ist das Kernelement.",fc:"Adhärenz: HAPA-Modell (Schwarzer), SMART, Change-Talk, Motivierende GF"},
{year:"2024",q:"Was trifft auf soziale Ungleichheit zu?",opts:["Nur Problem des globalen Südens","Indikatoren: Bildung, Beruf und Familie","Tritt erst in höherem Alter auf","Männer haben höhere Lebenserwartung als Frauen","Bezieht sich auf körperliche UND psychische Erkrankungen"],ans:4,topic:6,exp:"Soziale Ungleichheit beeinflusst sowohl körperliche als auch psychische Gesundheit – über den sozialen Gradienten. Gilt in allen westlichen Industrieländern. Die meritokratische Triade: Bildung, Beruf, Einkommen (nicht Familie).",fc:"Soz. Ungleichheit: Sozialgradient, meritokr. Triade, Wilkinson-Deprivation"},
{year:"2024",q:"Welche Aussage zum deutschen Gesundheitssystem stimmt NICHT?",opts:["Versicherungsgrenze: unter der muss man sich GKV versichern","Bundesgesundheitsministerium legt GKV-Leistungen fest","Versicherungspflicht für alle","Mittelweg zwischen staatlichem und marktwirtschaftlichem System","Beiträge sind einkommensabhängig"],ans:1,topic:11,exp:"Die GKV-Leistungen werden NICHT vom Bundesgesundheitsministerium festgelegt, sondern vom G-BA (Gemeinsamer Bundesausschuss).",fc:"Gesundheitssystem: GKV/PKV, G-BA, KBV, Sach-/Kostenerstattung, SAPV"},
{year:"2024",q:"Sachleistungsprinzip GKV – Richtigaussage:",opts:["Kassenbeiträge sind risikoabhängig","Arbeitgeber zahlen volle Kassenbeiträge","Versicherte müssen 30% tragen","Kosten werden aus Steuern finanziert","Versicherte müssen nicht in Vorleistung gehen"],ans:4,topic:11,exp:"Das Sachleistungsprinzip der GKV: Versicherte erhalten Leistungen direkt, da die Kasse direkt mit dem Leistungserbringer abrechnet. Versicherte müssen NICHT in Vorleistung gehen.",fc:"Gesundheitssystem: GKV/PKV, G-BA, KBV, Sach-/Kostenerstattung, SAPV"},
{year:"2024",q:"Alte Lehrerin mit ehemals gestochener Schrift, jetzt dement und unleserlich. Welcher Gedächtnisanteil gestört?",opts:["Arbeitsgedächtnis","Deklaratives Gedächtnis","Episodisches Gedächtnis","Semantisches Gedächtnis","Prozedurales Gedächtnis"],ans:4,topic:5,exp:"Das prozedurale Gedächtnis speichert Fertigkeiten und motorische Abläufe – z.B. Schreiben. Schreiben ist eine erlernte, automatisierte Fertigkeit, die im prozeduralen Gedächtnis gespeichert ist.",fc:"Gedächtnis: Episodisch, Semantisch, Prozedural, Priming, Amnesieformen"},
{year:"2024",q:"Frauen mit niedrigster beruflicher Qualifikation nehmen Zervixkarzinom-Screening weniger in Anspruch. Was zeigt die Grafik?",opts:["Frauen mit niedrigster Qualifikation nehmen Screening weniger in Anspruch","Kein Unterschied zwischen den Gruppen","Frauen gehen mit der Zeit seltener zum Arzt","Frauen mit hoher Qualifikation erkranken häufiger","Das Screening ist eine effektive Maßnahme"],ans:0,topic:6,exp:"Klassische Darstellung gesundheitlicher Ungleichheit: Frauen mit niedrigerem SES nehmen Präventionsangebote seltener wahr, obwohl alle GKV-Versicherten Anspruch haben.",fc:"Soz. Ungleichheit: Sozialgradient, meritokr. Triade, Wilkinson-Deprivation"},
