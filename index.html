const STATUSES = ["open","working","done","gaps"];
const S_LABEL  = {open:"Offen",working:"In Arbeit",done:"Fertig",gaps:"Lücken"};
const S_COLOR  = {open:"#334155",working:"#d97706",done:"#059669",gaps:"#dc2626"};
const S_ICON   = {open:"○",working:"◑",done:"●",gaps:"⚠"};

const mkDefault = () => {
  const d = {};
  UNITS.forEach(u => { d[u.id] = {status:"open",score:0,planned:"",completed:"",tags:[],notes:""}; });
  return d;
};

const daysUntil = d => Math.ceil((new Date(d) - new Date()) / 86400000);

const calcStreak = dates => {
  if (!dates.length) return 0;
  const sorted = [...new Set(dates)].sort().reverse();
  const cur = new Date(); cur.setHours(0,0,0,0);
  let count = 0;
  for (let i = 0; i < 90; i++) {
    const s = cur.toISOString().split("T")[0];
    if (sorted.includes(s)) { count++; cur.setDate(cur.getDate()-1); }
    else if (i === 0) cur.setDate(cur.getDate()-1);
    else break;
  }
  return count;
};

const fmt = s => {
  const h = String(Math.floor(s/3600)).padStart(2,"0");
  const m = String(Math.floor((s%3600)/60)).padStart(2,"0");
  return `${h}:${m}:${String(s%60).padStart(2,"0")}`;
};

// ── Helpers ───────────────────────────────────────────────────────────────────
function Ring({pct,size=100,stroke=10,color="#06b6d4",label,sub}) {
  const r=(size-stroke)/2, circ=2*Math.PI*r, dash=(pct/100)*circ;
  return (
    <div style={{position:"relative",width:size,height:size,flexShrink:0}}>
      <svg width={size} height={size} style={{transform:"rotate(-90deg)"}}>
        <circle cx={size/2} cy={size/2} r={r} fill="none" stroke="#1e293b" strokeWidth={stroke}/>
        <circle cx={size/2} cy={size/2} r={r} fill="none" stroke={color}
          strokeWidth={stroke} strokeDasharray={`${dash} ${circ}`} strokeLinecap="round"
          style={{transition:"stroke-dasharray .6s ease"}}/>
      </svg>
      <div style={{position:"absolute",inset:0,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center"}}>
        <span style={{fontSize:size>80?17:12,fontWeight:700,color:"#f1f5f9",fontFamily:"'IBM Plex Mono',monospace"}}>{label}</span>
        {sub&&<span style={{fontSize:10,color:"#64748b",marginTop:1}}>{sub}</span>}
      </div>
    </div>
  );
}

function Stars({score,onChange}) {
  return (
    <div style={{display:"flex",gap:2}}>
      {[1,2,3,4,5].map(i=>(
        <span key={i} onClick={e=>{e.stopPropagation();onChange(i===score?0:i)}}
          style={{cursor:"pointer",fontSize:15,color:i<=score?"#f59e0b":"#334155",transition:"color .15s",userSelect:"none"}}>★</span>
      ))}
    </div>
  );
}

function Pill({icon,label,bg,border,color}) {
  return (
    <div style={{display:"flex",alignItems:"center",gap:5,padding:"4px 10px",borderRadius:20,background:bg,border:`1px solid ${border}`,fontSize:12,fontWeight:600,color,whiteSpace:"nowrap"}}>
      {icon} {label}
    </div>
  );
}

function Label({children}) {
  return <div style={{fontSize:10,fontWeight:700,color:"#475569",letterSpacing:".12em",marginBottom:5}}>{children}</div>;
}

function StatusDot({s}) {
  return <div style={{width:9,height:9,borderRadius:"50%",background:S_COLOR[s],flexShrink:0}}/>;
}

function SyncDot({status}) {
  const cfg = {idle:{c:"#334155",t:"Gespeichert"},saving:{c:"#f59e0b",t:"Speichert…"},error:{c:"#ef4444",t:"Fehler"}};
  const {c,t} = cfg[status]||cfg.idle;
  return <div style={{display:"flex",alignItems:"center",gap:5,fontSize:11,color:c}}><div style={{width:7,height:7,borderRadius:"50%",background:c,animation:status==="saving"?"pulse 1s infinite":""}}/>  {t}</div>;
}

// ── Login Screen ──────────────────────────────────────────────────────────────
function LoginScreen() {
  const [email,setEmail] = useState("");
  const [sent,setSent]   = useState(false);
  const [err,setErr]     = useState("");
  const [loading,setLoading] = useState(false);

  const send = async () => {
    if (!email.includes("@")) return setErr("Bitte eine gültige E-Mail eingeben.");
    setLoading(true); setErr("");
    const {error} = await sb.auth.signInWithOtp({
      email,
      options: { emailRedirectTo: window.location.href }
    });
    setLoading(false);
    if (error) setErr(error.message);
    else setSent(true);
  };

  return (
    <div style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",padding:20,background:"#070d1c"}}>
      <div style={{width:"100%",maxWidth:400}}>
        <div style={{textAlign:"center",marginBottom:32}}>
          <div style={{width:60,height:60,background:"linear-gradient(135deg,#0e7490,#1d4ed8)",borderRadius:16,display:"flex",alignItems:"center",justifyContent:"center",fontSize:28,margin:"0 auto 16px"}}>⚕</div>
          <div style={{fontFamily:"'IBM Plex Mono',monospace",fontWeight:600,fontSize:22,color:"#f1f5f9",letterSpacing:".05em"}}>PhysioTrack</div>
          <div style={{fontSize:13,color:"#475569",marginTop:4}}>MHH · HannibaL 2025/26</div>
        </div>

        <div className="card" style={{padding:24}}>
          {!sent ? (
            <>
              <div style={{fontSize:14,color:"#94a3b8",marginBottom:20,textAlign:"center",lineHeight:1.6}}>
                Melde dich mit deiner E-Mail an. Du bekommst einen Magic Link — kein Passwort nötig.
              </div>
              <Label>E-MAIL</Label>
              <input type="email" value={email} onChange={e=>setEmail(e.target.value)}
                onKeyDown={e=>e.key==="Enter"&&send()}
                placeholder="name@email.de"
                style={{width:"100%",background:"#1e293b",border:"1px solid #334155",borderRadius:10,padding:"12px 14px",color:"#e2e8f0",fontSize:14,marginBottom:12}}/>
              {err && <div style={{color:"#ef4444",fontSize:12,marginBottom:10}}>{err}</div>}
              <button onClick={send} disabled={loading}
                style={{width:"100%",padding:"12px",borderRadius:10,background:"linear-gradient(135deg,#0e7490,#1d4ed8)",color:"#fff",fontWeight:700,fontSize:14,opacity:loading?.6:1}}>
                {loading?"Sende Link…":"Magic Link senden ✉"}
              </button>
            </>
          ) : (
            <div style={{textAlign:"center",padding:"20px 0"}}>
              <div style={{fontSize:40,marginBottom:12}}>✉</div>
              <div style={{fontWeight:600,fontSize:16,marginBottom:8}}>Link gesendet!</div>
              <div style={{fontSize:13,color:"#94a3b8",lineHeight:1.7}}>Schau in dein Postfach ({email}) und klicke auf den Link. Du wirst automatisch eingeloggt.</div>
            </div>
          )}
        </div>
      </div>
    </div>
  );
}

// ── Main App (LocalStorage) ───────────────────────────────────────────────────
function App() {
  const [tab, setTab]     = useState("dashboard");
  const [data, setData]   = useState(() => { try { return JSON.parse(localStorage.getItem("physio_data")) || mkDefault(); } catch { return mkDefault(); } });
  const [dates, setDates] = useState(() => { try { return JSON.parse(localStorage.getItem("physio_dates")) || []; } catch { return []; } });
  const [sync, setSync]   = useState("idle");
  const [sel, setSel]     = useState(null);
  const [tagInput, setTagInput] = useState("");
  const [timer, setTimer] = useState(0);
  const [running, setRunning] = useState(false);
  const [timerMode, setTimerMode] = useState("study");
  const timerRef = useRef(null);
  const saveTimer = useRef(null);

  const persist = useCallback((d, s) => {
    setSync("saving");
    clearTimeout(saveTimer.current);
    saveTimer.current = setTimeout(() => {
      try { localStorage.setItem("physio_data", JSON.stringify(d)); localStorage.setItem("physio_dates", JSON.stringify(s)); setSync("idle"); }
      catch(e) { setSync("error"); }
    }, 600);
  }, []);

  const upd = (id, patch) => { const nd={...data,[id]:{...data[id],...patch}}; setData(nd); persist(nd,dates); };
  const markToday = () => { const t=new Date().toISOString().split("T")[0]; if(dates.includes(t))return; const nd=[...dates,t]; setDates(nd); persist(data,nd); };
  const logout = () => { if(confirm("Alle lokalen Daten zurücksetzen?")){ localStorage.clear(); setData(mkDefault()); setDates([]); } };

  useEffect(() => {
    if (running) { timerRef.current = setInterval(()=>setTimer(t=>t+1),1000); }
    else clearInterval(timerRef.current);
    return ()=>clearInterval(timerRef.current);
  }, [running]);

  // Derived
  const mcDays   = daysUntil(MC_EXAM);

  const totalDone= p1done+p2done;

  const mcColor  = mcDays<7?"#ef4444":mcDays<28?"#f59e0b":"#10b981";

    {id:"dashboard",icon:"▦",label:"Dashboard"},

    {id:"radar",    icon:"◎",label:"Radar"},
    {id:"timer",    icon:"◷",label:"Timer"},
    {id:"export",   icon:"↑", label:"Export"},
  ];

  return (
    <div style={{minHeight:"100vh",background:"#070d1c",color:"#e2e8f0",fontFamily:"'IBM Plex Sans',system-ui,sans-serif"}}>
      <style>{`
        @keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
        .unit-row:hover{background:#162032!important}
